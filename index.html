<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuvAi - AI that truly understands and cares about you</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FF69B4',
            'primary-dark': '#E85AA0',
            'primary-light': '#FFB6D9',
            'bg-main': '#FAFAFC',
            'bg-card': '#FFFFFF',
            'text-primary': '#1A1A2E',
            'text-secondary': '#5A5A72',
            'border-light': '#E8E8F0',
          },
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg: #FAFAFC;
      --fg: #1A1A2E;
      --muted: #5A5A72;
      --accent: #FF69B4;
      --card: #FFFFFF;
      --border: #E8E8F0;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--fg);
    }

    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #E85AA0;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 105, 180, 0.3); }
      50% { box-shadow: 0 0 40px rgba(255, 105, 180, 0.5); }
    }

    @keyframes typing-dot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .animate-fade-in-left {
      animation: fadeInLeft 0.6s ease-out forwards;
    }

    .animate-scale-in {
      animation: scaleIn 0.5s ease-out forwards;
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    .animate-pulse-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .stagger-1 { animation-delay: 0.1s; opacity: 0; }
    .stagger-2 { animation-delay: 0.2s; opacity: 0; }
    .stagger-3 { animation-delay: 0.3s; opacity: 0; }
    .stagger-4 { animation-delay: 0.4s; opacity: 0; }
    .stagger-5 { animation-delay: 0.5s; opacity: 0; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Background pattern */
    .bg-pattern {
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(255, 105, 180, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 182, 217, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(255, 105, 180, 0.05) 0%, transparent 30%);
    }

    /* Glass effect */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Message bubbles */
    .message-user {
      background: linear-gradient(135deg, #FF69B4 0%, #E85AA0 100%);
      border-radius: 20px 20px 4px 20px;
    }

    .message-ai {
      background: white;
      border-radius: 20px 20px 20px 4px;
      border: 1px solid var(--border);
    }

    /* Typing indicator */
    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      margin: 0 2px;
      animation: typing-dot 1.4s infinite ease-in-out both;
    }

    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* Sidebar transitions */
    .sidebar-transition {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                  opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Button hover effects */
    .btn-primary {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    /* Card hover effects */
    .pricing-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .pricing-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px -12px rgba(255, 105, 180, 0.25);
    }

    /* Focus states */
    button:focus-visible,
    a:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Textarea auto-resize */
    textarea {
      field-sizing: content;
      min-height: 52px;
      max-height: 200px;
    }
  </style>
</head>
<body>

  <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 glass border-b border-border-light">

    // Initialize state

    let messages = [];

    // Load data from localStorage
    function loadFromStorage() {
      try {
        const savedChats = localStorage.getItem('luvai_chats');
        if (savedChats) chats = JSON.parse(savedChats);
        
        const savedUser = localStorage.getItem('luvai_user');
        if (savedUser) USER_DATA.credits = JSON.parse(savedUser).credits || 100;
      } catch (e) {
        console.log('Storage load error:', e);
      }
    }

    function saveToStorage() {
      try {
        localStorage.setItem('luvai_chats', JSON.stringify(chats));
        localStorage.setItem('luvai_user', JSON.stringify(USER_DATA));
      } catch (e) {
        console.log('Storage save error:', e);
      }
    }

    // ============================================
    // ROUTER
    // ============================================

            (path === '/' && link.getAttribute('href') === 'index.html')) {
          link.classList.add('text-primary');
        }

    function formatMessage(content) {
      // Basic formatting - escape HTML then handle line breaks
      const escaped = content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return escaped.replace(/\n/g, '<br>');

    function toggleSidebar() {
      isSidebarOpen = !isSidebarOpen;
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      
      if (isSidebarOpen) {
        sidebar.classList.remove('-translate-x-full');

      } else {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');

    function createNewChat() {
      currentChatId = Date.now().toString();
      messages = [];
      
      const newChat = {
        id: currentChatId,
        title: 'New conversation',
        date: new Date().toISOString(),
        messages: []
      };
      
      chats.unshift(newChat);
      saveToStorage();
      
      document.getElementById('chatHistoryList').innerHTML = renderChatHistory();
      document.getElementById('messagesContainer').innerHTML = renderMessages();
      
      // Close sidebar on mobile after creating new chat
      if (window.innerWidth < 768 && isSidebarOpen) {
        toggleSidebar();
      }
    }

    function loadChat(chatId) {
      currentChatId = chatId;
      const chat = chats.find(c => c.id === chatId);
      if (chat) {
        messages = chat.messages || [];
      }
      
      document.getElementById('chatHistoryList').innerHTML = renderChatHistory();
      document.getElementById('messagesContainer').innerHTML = renderMessages();
      
      setTimeout(() => {
        scrollToBottom();
        animateMessages();
      }, 50);
      
      // Close sidebar on mobile
      if (window.innerWidth < 768 && isSidebarOpen) {
        toggleSidebar();
      }
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message || isTyping) return;
      
      // Create chat if none exists
      if (!currentChatId) {
        createNewChat();
      }
      
      // Add user message
      messages.push({ role: 'user', content: message });
      
      // Update chat title if first message
      const chat = chats.find(c => c.id === currentChatId);
      if (chat && chat.messages.length === 0) {
        chat.title = message.substring(0, 30) + (message.length > 30 ? '...' : '');
      }
      
      input.value = '';
      input.style.height = 'auto';
      
      // Update UI
      document.getElementById('messagesContainer').innerHTML = renderMessages();
      scrollToBottom();
      animateMessages();
      document.getElementById('chatHistoryList').innerHTML = renderChatHistory();
      
      // Show typing indicator
      isTyping = true;
      updateSendButton();
      document.getElementById('messagesContainer').innerHTML = renderMessages();
      scrollToBottom();
      
      try {
        // Call OpenRouter API
        const response = await fetch(APP_CONFIG.openRouterUrl, {
          method: 'POST',
          headers: {
            "Authorization": "Bearer " + (localStorage.getItem('luvai_api_key') || 'YOUR_OPENROUTER_API_KEY'),
            "HTTP-Referer": "https://luvai.com",
            "X-OpenRouter-Title": "LuvAi",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: localStorage.getItem('luvai_model') || APP_CONFIG.defaultModel,
            messages: [
              {
                role: 'system',
                content: "You are LuvAi, a warm, empathetic AI companion that truly cares about users. You respond with genuine warmth, ask thoughtful questions, and provide supportive guidance. Be conversational, friendly, and show real interest in helping. Use a caring tone but remain helpful and practical."
              },
              ...messages
            ]
          })
        });
        
        const data = await response.json();
        
        if (data.choices && data.choices.length > 0) {
          const aiMessage = data.choices[0].message.content;
          messages.push({ role: 'assistant', content: aiMessage });
          
          // Save to chat history
          if (chat) {
            chat.messages = [...messages];
          }
          saveToStorage();
        } else {
          throw new Error('No response from AI');
        }
        
      } catch (error) {
        console.error('API Error:', error);
        messages.push({ 
          role: 'assistant', 
          content: "I apologize, but I'm having trouble connecting right now. Please check your API key in settings, or try again in a moment." 
        });
      }
      
      // Hide typing indicator and show response
      isTyping = false;
      updateSendButton();
      document.getElementById('messagesContainer').innerHTML = renderMessages();
      scrollToBottom();
      animateMessages();
    }

    function sendSuggestion(text) {
      document.getElementById('messageInput').value = text;
      sendMessage();
    }

    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    function autoResizeTextarea(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
    }

    function updateSendButton() {
      const btn = document.getElementById('sendBtn');
      if (btn) {
        btn.disabled = isTyping;
      }
    }

    function scrollToBottom() {
      const container = document.getElementById('messagesContainer');
      if (container) {
        container.scrollTop = container.scrollHeight;
      }
    }

    function animateMessages() {
      const items = document.querySelectorAll('.message-item');
      items.forEach((item, idx) => {
        setTimeout(() => {
          item.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
          item.style.opacity = '1';
          item.style.transform = 'translateY(0)';
        }, idx * 80);
      });
    }

    // ============================================
    // SCROLL ANIMATIONS
    // ============================================
    
    function initScrollAnimations() {
      setupIntersectionObserver();
    }

    function setupIntersectionObserver() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.animate-fade-in-up, .animate-fade-in-left, .animate-scale-in').forEach(el => {
        observer.observe(el);
      });
    }

    // ============================================
    // EVENT LISTENERS
    // ============================================
    
    // Mobile menu toggle
    document.addEventListener('DOMContentLoaded', () => {
      router();
      
      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const mobileMenu = document.getElementById('mobileMenu');
      
      if (mobileMenuBtn && mobileMenu) {
        mobileMenuBtn.addEventListener('click', () => {
          mobileMenu.classList.toggle('hidden');
        });
      }
      
      // Handle window resize for sidebar
      window.addEventListener('resize', () => {
        if (window.innerWidth >= 768) {
          const overlay = document.getElementById('sidebarOverlay');
          if (overlay) overlay.classList.add('hidden');
        }
      });
    });

    // Handle navigation
    window.addEventListener('popstate', router);

    // Make functions globally available
    window.toggleSidebar = toggleSidebar;
    window.createNewChat = createNewChat;
    window.loadChat = loadChat;
    window.sendMessage = sendMessage;
    window.sendSuggestion = sendSuggestion;
    window.handleKeyDown = handleKeyDown;
    window.autoResizeTextarea = autoResizeTextarea;
  </script>
</body>
</html>
