    function Icon({ name, size = 24, className = "" }) {
      const ref = useRef(null);
      
      useEffect(() => {
        if (ref.current && lucide) {
          ref.current.innerHTML = '';
          const icon = lucide.createElement(lucide.icons[name]);
          icon.setAttribute('width', size);
          icon.setAttribute('height', size);
          if (className) icon.setAttribute('class', className);
          ref.current.appendChild(icon);
        }
      }, [name, size, className]);
      
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
    }

    // ==================== ANIMATED COUNTER ====================
    function AnimatedCounter({ target, duration = 2000 }) {
      const [count, setCount] = useState(0);
      const [isVisible, setIsVisible] = useState(false);
      const ref = useRef(null);
      
      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting && !isVisible) {
              setIsVisible(true);
            }
          },
          { threshold: 0.5 }
        );
        
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
      
      useEffect(() => {
        if (!isVisible) return;
        
        let startTime;
        const step = (timestamp) => {
          if (!startTime) startTime = timestamp;
          const progress = Math.min((timestamp - startTime) / duration, 1);
          setCount(Math.floor(progress * target));
          
          if (progress < 1) {
            requestAnimationFrame(step);
          }
        };
        
        requestAnimationFrame(step);
      }, [isVisible, target, duration]);
      
      return <span ref={ref}>{count}</span>;
    }

                      <span className="font-display text-3xl font-bold">RM{plan.price}</span>
                      <span className="text-brand-paragraph line-through text-sm">RM{plan.originalPrice}</span>
                      <span className="text-brand-paragraph">/month</span>
                    </div>
                  </div>
                  
                  <ul className="space-y-3 mb-6">
                    {plan.features.map((feature, i) => (
                      <li key={i} className="flex items-center gap-2 text-sm text-brand-paragraph">
                        <Icon name="Check" size={16} className="text-brand-button" />
                        {feature}
                      </li>
                    ))}
                  </ul>
                  
                  <button className={`w-full py-3 rounded-xl font-semibold transition-all ${
                    plan.popular ? 'btn-primary' : 'btn-secondary'
                  }`}>
                    Upgrade to {plan.name}
                  </button>
                </div>
              ))}
            </div>
          </div>
          
          {/* FAQ */}
          <div className="glass-card rounded-2xl p-6">
            <h3 className="font-display text-xl font-semibold mb-4">Frequently Asked Questions</h3>
            <div className="space-y-4">
              {[
                { q: 'Can I change my plan anytime?', a: 'Yes! You can upgrade or downgrade your plan at any time.' },
                { q: 'What payment methods do you accept?', a: 'We accept credit/debit cards, FPX, and online banking.' },
                { q: 'Is there a refund policy?', a: 'Yes, we offer a 14-day money-back guarantee for all paid plans.' }
              ].map((faq, i) => (
                <div key={i} className="p-4 rounded-xl bg-white/[0.03] border border-white/5">
                  <h4 className="font-medium mb-2">{faq.q}</h4>
                  <p className="text-sm text-brand-paragraph">{faq.a}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ==================== SETTINGS PAGE ====================
    function SettingsPage() {
      const [profile, setProfile] = useState({
        name: 'John Doe',
        email: 'john@example.com',
        company: 'Acme Inc.'
      });
      
      return (
        <div className="page-active space-y-6 pb-24 lg:pb-6">
          <div>
            <h1 className="font-display text-2xl sm:text-3xl font-bold">Settings</h1>
            <p className="text-brand-paragraph mt-1">Manage your account settings</p>
          </div>
          
          {/* Profile section */}
          <div className="glass-card rounded-2xl p-6">
            <h3 className="font-display text-lg font-semibold mb-6">Profile Information</h3>
            
            <div className="flex flex-col sm:flex-row items-start gap-6 mb-6">
              <div className="relative">
                <div className="w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-button to-orange-400 flex items-center justify-center text-brand-button-text font-bold text-2xl">
                  JD
                </div>
                <button className="absolute -bottom-2 -right-2 w-8 h-8 rounded-lg bg-brand-bg border border-white/20 flex items-center justify-center hover:bg-white/5 transition-colors">
                  <Icon name="Camera" size={14} />
                </button>
              </div>
              
              <div className="flex-1 space-y-4 w-full">
                <div>
                  <label className="block text-sm font-medium mb-2">Full Name</label>
                  <input
                    type="text"
                    value={profile.name}
                    onChange={(e) => setProfile({...profile, name: e.target.value})}
                    className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10"
                  />
                </div>
                <div className="grid sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium mb-2">Email</label>
                    <input
                      type="email"
                      value={profile.email}
                      onChange={(e) => setProfile({...profile, email: e.target.value})}
                      className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-2">Company</label>
                    <input
                      type="text"
                      value={profile.company}
                      onChange={(e) => setProfile({...profile, company: e.target.value})}
                      className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10"
                    />
                  </div>
                </div>
              </div>
            </div>
            
            <button className="btn-primary px-6 py-3 rounded-xl font-semibold">
              Save Changes
            </button>
          </div>
          
          {/* Plan info */}
          <div className="glass-card rounded-2xl p-6">
            <h3 className="font-display text-lg font-semibold mb-4">Plan Details</h3>
            
            <div className="p-4 rounded-xl bg-white/[0.03] border border-white/10 mb-4">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-brand-secondary/15 flex items-center justify-center">
                    <Icon name="Package" size={20} className="text-brand-secondary" />
                  </div>
                  <div>
                    <div className="font-medium">Free Plan</div>
                    <div className="text-sm text-brand-paragraph">10 emails per month</div>
                  </div>
                </div>
                <span className="px-3 py-1 rounded-full bg-brand-secondary/15 text-brand-secondary text-sm font-medium">
                  Current
                </span>
              </div>
            </div>
            
            {/* Watermark status */}
            <div className="p-4 rounded-xl bg-brand-button/10 border border-brand-button/20">
              <div className="flex items-start gap-3">
                <div className="w-10 h-10 rounded-xl bg-brand-button/20 flex items-center justify-center shrink-0">
                  <Icon name="Stamp" size={20} className="text-brand-button" />
                </div>
                <div>
                  <div className="font-medium text-brand-button mb-1">Watermark Enabled</div>
                  <p className="text-sm text-brand-paragraph">
                    Your emails display "Sent via LuvMail" branding. Upgrade to Starter or Pro plan to remove the watermark.
                  </p>
                  <button className="mt-3 btn-primary px-4 py-2 rounded-lg text-sm font-semibold">
                    Upgrade to Remove
                  </button>
                </div>
              </div>
            </div>
          </div>
          
          {/* Usage limits */}
          <div className="glass-card rounded-2xl p-6">
            <h3 className="font-display text-lg font-semibold mb-4">Usage Limits</h3>
            
            <div className="space-y-4">
              {[
                { label: 'Monthly Emails', used: 3, limit: 10, unit: 'emails' },
                { label: 'Contacts', used: 12, limit: 50, unit: 'contacts' },
                { label: 'Storage', used: 2.4, limit: 10, unit: 'MB' }
              ].map((item, i) => (
                <div key={i} className="p-4 rounded-xl bg-white/[0.03] border border-white/5">
                  <div className="flex items-center justify-between mb-2">
                    <span className="font-medium">{item.label}</span>
                    <span className="text-sm text-brand-paragraph">
                      {item.used} / {item.limit} {item.unit}
                    </span>
                  </div>
                  <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                    <div 
                      className="h-full bg-gradient-to-r from-brand-button to-orange-400 rounded-full transition-all duration-1000"
                      style={{ width: `${(item.used / item.limit) * 100}%` }}
                    ></div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          
          {/* Danger zone */}
          <div className="glass-card rounded-2xl p-6 border border-red-500/20">
            <h3 className="font-display text-lg font-semibold text-red-400 mb-4">Danger Zone</h3>
            <p className="text-sm text-brand-paragraph mb-4">
              Once you delete your account, there is no going back. Please be certain.
            </p>
            <button className="px-5 py-2.5 rounded-xl bg-red-500/15 text-red-400 font-semibold hover:bg-red-500/25 transition-colors">
              Delete Account
            </button>
          </div>
        </div>
      );
    }

    // ==================== DASHBOARD LAYOUT ====================
    function DashboardLayout({ children, currentPage, setCurrentPage }) {
      return (
        <div className="min-h-screen bg-brand-bg">
          <Sidebar currentPage={currentPage} setCurrentPage={setCurrentPage} />
          
          <main className="lg:ml-64 min-h-screen">
            <TopBar setCurrentPage={setCurrentPage} />
            <div className="p-6">
              {children}
            </div>
          </main>
          
          <MobileNav currentPage={currentPage} setCurrentPage={setCurrentPage} />
        </div>
      );
    }

    // ==================== LANDING PAGE ====================
    function LandingPage({ setCurrentPage }) {
      return (
        <div className="min-h-screen">
          <HeroSection setCurrentPage={setCurrentPage} />
          <FeaturesSection />
          <PricingSection setCurrentPage={setCurrentPage} />
          <Footer setCurrentPage={setCurrentPage} />
        </div>
      );
    }

    // ==================== MAIN APP ====================
    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      
      useEffect(() => {
        window.scrollTo(0, 0);
      }, [currentPage]);
      
      const renderPage = () => {
        switch (currentPage) {
          case 'login':
            return <LoginPage setCurrentPage={setCurrentPage} />;
          case 'signup':
            return <SignUpPage setCurrentPage={setCurrentPage} />;
          case 'dashboard':
          case 'dashboard/dashboard':
            return (
              <DashboardLayout currentPage={currentPage} setCurrentPage={setCurrentPage}>
                <DashboardHome />
              </DashboardLayout>
            );
          case 'dashboard/send':
            return (
              <DashboardLayout currentPage={currentPage} setCurrentPage={setCurrentPage}>
                <SendEmailPage />
              </DashboardLayout>
            );
          case 'dashboard/history':
            return (
              <DashboardLayout currentPage={currentPage} setCurrentPage={setCurrentPage}>
                <HistoryPage />
              </DashboardLayout>
            );
          case 'dashboard/billing':
            return (
              <DashboardLayout currentPage={currentPage} setCurrentPage={setCurrentPage}>
                <BillingPage setCurrentPage={setCurrentPage} />
              </DashboardLayout>
            );
          case 'dashboard/settings':
            return (
              <DashboardLayout currentPage={currentPage} setCurrentPage={setCurrentPage}>
                <SettingsPage />
              </DashboardLayout>
            );
          default:
            return <LandingPage setCurrentPage={setCurrentPage} />;
        }
      };
      
      const showNav = !currentPage.startsWith('dashboard') && currentPage !== 'login' && currentPage !== 'signup';
      
      return (
        <div className="min-h-screen bg-brand-bg">
          {showNav && <Navigation currentPage={currentPage} setCurrentPage={setCurrentPage} />}
          {renderPage()}
        </div>
      );
    }

    // Render app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
