<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Luviio Admin Portal</title>
  
  <link rel="icon" type="image/png" href="https://i.ibb.co/tw6B1xLp/cropped-luviio.png" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #ffffff;
      border-right: 1px solid #e2e8f0;
      transition: transform 0.3s ease;
      z-index: 40;
    }
    
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      margin: 2px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #64748b;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .sidebar-link:hover {
      background: #f1f5f9;
      color: #334155;
    }
    
    .sidebar-link.active {
      background: linear-gradient(135deg, #ff005e 0%, #ff3377 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 0, 94, 0.25);
    }
    
    .sidebar-link.active svg { stroke: white; }

    /* Cards */
    .stat-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #e2e8f0;
      transition: all 0.3s ease;
    }
    
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
    }

    .content-card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    /* Table */
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .data-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .data-table td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }
    
    .data-table tr:hover td {
      background: #fafbfc;
    }

    /* Status Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warning { background: #fef9c3; color: #854d0e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #dbeafe; color: #1e40af; }
    .badge-neutral { background: #f1f5f9; color: #475569; }

    /* Buttons */
    .btn-primary {
      background: #ff005e;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary:hover {
      background: #e60055;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 0, 94, 0.3);
    }
    
    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-secondary:hover {
      background: #e2e8f0;
    }

    /* Inputs */
    .input-field {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s;
      background: #ffffff;
    }
    
    .input-field:focus {
      border-color: #ff005e;
      box-shadow: 0 0 0 3px rgba(255, 0, 94, 0.08);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .modal-overlay.show {
      display: flex;
      opacity: 1;
    }
    
    .modal-content {
      background: white;
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      transform: scale(0.95) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 25px 60px -15px rgba(0,0,0,0.25);
    }
    
    .modal-overlay.show .modal-content {
      transform: scale(1) translateY(0);
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-in {
      animation: fadeInUp 0.4s ease-out forwards;
    }

    /* Chart placeholder */
    .chart-bar {
      transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Mobile sidebar toggle */
    @media (max-width: 1024px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
        box-shadow: 20px 0 60px rgba(0,0,0,0.15);
      }
    }

    /* Tab styles */
    .tab-btn {
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab-btn:hover { color: #334155; }
    .tab-btn.active {
      color: #ff005e;
      border-bottom-color: #ff005e;
    }

    /* Loading spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e2e8f0;
      border-top-color: #ff005e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 via-white to-slate-50 p-4">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <img src="https://i.ibb.co/8LkD1bym/logo-black-luviio-removebg-preview.png" alt="Luviio" class="h-10 mx-auto mb-4">
        <h1 class="text-2xl font-bold text-slate-800">Admin Portal</h1>
        <p class="text-sm text-slate-500 mt-1">Sign in to access the dashboard</p>
      </div>
      
      <div class="bg-white rounded-2xl shadow-lg shadow-slate-200/50 p-8 border border-slate-200">
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Email</label>
              <input type="email" id="loginEmail" required class="input-field" placeholder="admin@luviio.com" value="">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Password</label>
              <input type="password" id="loginPassword" required class="input-field" placeholder="••••••••">
            </div>
            <div id="loginError" class="hidden text-red-500 text-xs bg-red-50 p-3 rounded-lg"></div>
            <button type="submit" id="loginBtn" class="btn-primary w-full justify-center h-12 text-base mt-2">
              Sign In
            </button>
          </div>
        </form>
      </div>
      
      <p class="text-center text-xs text-slate-400 mt-6">Luviio Internal Tools • Secure Access Only</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="hidden flex h-screen overflow-hidden">
    
    <!-- Mobile Overlay -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/30 z-30 hidden lg:hidden"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar flex flex-col h-full">
      <div class="p-5 border-b border-slate-100 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="https://i.ibb.co/8LkD1bym/logo-black-luviio-removebg-preview.png" alt="Luviio" class="h-7">
          <span class="font-bold text-sm text-slate-800">Admin</span>
        </div>
        <button onclick="toggleSidebar()" class="lg:hidden w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <nav class="flex-1 py-4 overflow-y-auto space-y-1">
        <div class="sidebar-link active" data-page="dashboard" onclick="showPage('dashboard')">
          <i data-lucide="layout-dashboard" class="w-[18px] h-[18px]"></i> Dashboard
        </div>
        
        <div class="mt-4 px-4"><span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Clients</span></div>
        <div class="sidebar-link" data-page="clients" onclick="showPage('clients')">
          <i data-lucide="users" class="w-[18px] h-[18px]"></i> All Clients
        </div>
        <div class="sidebar-link" data-page="subscriptions" onclick="showPage('subscriptions')">
          <i data-lucide="credit-card" class="w-[18px] h-[18px]"></i> Subscriptions
        </div>
        <div class="sidebar-link" data-page="requests" onclick="showPage('requests')">
          <i data-lucide="file-text" class="w-[18px] h-[18px]"></i> Client Requests
        </div>
        <div class="sidebar-link" data-page="invoices" onclick="showPage('invoices')">
          <i data-lucide="receipt" class="w-[18px] h-[18px]"></i> Invoices & Cashbills
        </div>
        <div class="sidebar-link" data-page="feedback" onclick="showPage('feedback')">
          <i data-lucide="message-square" class="w-[18px] h-[18px]"></i> Feedback / Complaints
        </div>

        <div class="mt-4 px-4"><span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Company</span></div>
        <div class="sidebar-link" data-page="expenses" onclick="showPage('expenses')">
          <i data-lucide="wallet" class="w-[18px] h-[18px]"></i> Expenses
        </div>
        <div class="sidebar-link" data-page="company-subs" onclick="showPage('company-subs')">
          <i data-lucide="building-2" class="w-[18px] h-[18px]"></i> Company Subscriptions
        </div>
        <div class="sidebar-link" data-page="team" onclick="showPage('team')">
          <i data-lucide="user-cog" class="w-[18px] h-[18px]"></i> Team Members
        </div>
        <div class="sidebar-link" data-page="emails" onclick="showPage('emails')">
          <i data-lucide="mail" class="w-[18px] h-[18px]"></i> Active Emails
        </div>
        <div class="sidebar-link" data-page="imgbb" onclick="showPage('imgbb')">
          <i data-lucide="image" class="w-[18px] h-[18px]"></i> IMGBB Manager
        </div>
      </nav>

      <div class="p-4 border-t border-slate-100">
        <button onclick="handleLogout()" class="sidebar-link w-full !text-red-500 hover:!bg-red-50 hover:!text-red-600">
          <i data-lucide="log-out" class="w-[18px] h-[18px]"></i> Sign Out
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 flex flex-col overflow-hidden bg-slate-50/50">
      
      <!-- TOP BAR -->
      <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 flex-shrink-0">
        <div class="flex items-center gap-3">
          <button onclick="toggleSidebar()" class="lg:hidden w-9 h-9 rounded-lg hover:bg-slate-100 flex items-center justify-center">
            <i data-lucide="menu" class="w-5 h-5 text-slate-600"></i>
          </button>
          <h2 id="pageTitle" class="font-semibold text-slate-800 text-base">Dashboard</h2>
        </div>
        
        <div class="flex items-center gap-3">
          <div class="relative">
            <input type="text" placeholder="Search..." class="input-field !w-64 !py-2 !pl-9 !pr-4 !text-xs" onkeyup="globalSearch(this.value)">
            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
          </div>
          <div class="w-9 h-9 rounded-full bg-gradient-to-br from-pink-500 to-rose-500 flex items-center justify-center text-white text-xs font-bold cursor-pointer">
            A
          </div>
        </div>
      </header>

      <!-- SCROLLABLE CONTENT -->
      <div class="flex-1 overflow-y-auto p-6" id="pageContent">
        <!-- Content injected by JS -->
      </div>

    </main>
  </div>

  <!-- MODAL CONTAINER -->
  <div id="modalContainer" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script>
    // ==========================================
    // FIREBASE INITIALIZATION
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyCVwJ1JbJbv-Wlon78Emgszc4MBcO434Yk",
      authDomain: "luviio.firebaseapp.com",
      projectId: "luviio",
      storageBucket: "luviio.firebasestorage.app",
      messagingSenderId: "3939074932",
      appId: "1:3939074932:web:89bb6167243b13f6d4e221",
      measurementId: "G-7KNGY1MSQ1"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ==========================================
    // STATE MANAGEMENT
    // ==========================================
    let currentPage = 'dashboard';
    let currentUser = null;

    // ==========================================
    // AUTHENTICATION
    // ==========================================
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');
      
      btn.innerHTML = '<div class="spinner"></div>';
      btn.disabled = true;
      errorEl.classList.add('hidden');

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          currentUser = userCredential.user;
          document.getElementById('loginScreen').classList.add('hidden');
          document.getElementById('mainApp').classList.remove('hidden');
          document.getElementById('mainApp').classList.add('flex');
          showPage('dashboard');
          lucide.createIcons();
        })
        .catch((error) => {
          errorEl.textContent = error.message;
          errorEl.classList.remove('hidden');
          btn.innerHTML = 'Sign In';
          btn.disabled = false;
        });
    }

    function handleLogout() {
      auth.signOut().then(() => {
        document.getElementById('mainApp').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        currentUser = null;
      });
    }

    auth.onAuthStateChanged((user) => {
      if (user) {
        currentUser = user;
        if (document.getElementById('mainApp').classList.contains('hidden')) {
          document.getElementById('loginScreen').classList.add('hidden');
          document.getElementById('mainApp').classList.remove('hidden');
          document.getElementById('mainApp').classList.add('flex');
          showPage(currentPage);
        }
      } else {
        document.getElementById('mainApp').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
      }
    });

    // ==========================================
    // NAVIGATION
    // ==========================================
    function showPage(page) {
      currentPage = page;
      const content = document.getElementById('pageContent');
      const title = document.getElementById('pageTitle');
      
      // Update sidebar active state
      document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
      const activeLink = document.querySelector(`[data-page="${page}"]`);
      if (activeLink) activeLink.classList.add('active');

      // Close mobile sidebar
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.add('hidden');

      // Page titles mapping
      const titles = {
        'dashboard': 'Dashboard',
        'clients': 'Client Management',
        'subscriptions': 'Active Subscriptions',
        'requests': 'Client Requests',
        'invoices': 'Invoices & Cashbills',
        'feedback': 'Feedback & Complaints',
        'expenses': 'Company Expenses',
        'company-subs': 'Company Subscriptions',
        'team': 'Team Members',
        'emails': 'Active Email Accounts',
        'imgbb': 'IMGBB Image Manager'
      };
      title.textContent = titles[page] || page;

      // Load content with loading state
      content.innerHTML = `
        <div class="flex items-center justify-center h-64">
          <div class="spinner" style="width:32px;height:32px;border-width:3px;"></div>
        </div>
      `;

      setTimeout(() => {
        switch(page) {
          case 'dashboard': renderDashboard(); break;
          case 'clients': renderClients(); break;
          case 'subscriptions': renderSubscriptions(); break;
          case 'requests': renderRequests(); break;
          case 'invoices': renderInvoices(); break;
          case 'feedback': renderFeedback(); break;
          case 'expenses': renderExpenses(); break;
          case 'company-subs': renderCompanySubs(); break;
          case 'team': renderTeam(); break;
          case 'emails': renderEmails(); break;
          case 'imgbb': renderImgBB(); break;
        }
        lucide.createIcons();
      }, 300);
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('hidden');
    }

    // ==========================================
    // DASHBOARD PAGE
    // ==========================================
    async function renderDashboard() {
      const content = document.getElementById('pageContent');
      
      // Fetch stats in parallel
      const [clientsSnap, subsSnap, expensesSnap, requestsSnap, invoicesSnap] = await Promise.all([
        db.collection('clients').get(),
        db.collection('subscriptions').where('status', '==', 'active').get(),
        db.collection('expenses').get(),
        db.collection('client_requests').orderBy('createdAt', 'desc').limit(5).get(),
        db.collection('invoices').orderBy('createdAt', 'desc').limit(5).get()
      ]);

      const totalClients = clientsSnap.size;
      const activeSubs = subsSnap.size;
      
      let totalIncome = 0;
      let totalExpenses = 0;
      
      invoicesSnap.forEach(doc => {
        const d = doc.data();
        if (d.status === 'paid') totalIncome += parseFloat(d.amount || 0);
      });
      
      expensesSnap.forEach(doc => {
        totalExpenses += parseFloat(doc.data().amount || 0);
      });

      const profit = totalIncome - totalExpenses;

      content.innerHTML = `
        <div class="animate-in space-y-6">
          
          <!-- Stats Grid -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
            <div class="stat-card">
              <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center">
                  <i data-lucide="users" class="w-5 h-5 text-blue-600"></i>
                </div>
                <span class="text-xs font-medium text-green-600 bg-green-50 px-2 py-1 rounded-full">+12%</span>
              </div>
              <p class="text-2xl font-bold text-slate-800">${totalClients}</p>
              <p class="text-xs text-slate-500 mt-1">Total Clients</p>
            </div>
            
            <div class="stat-card">
              <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center">
                  <i data-lucide="credit-card" class="w-5 h-5 text-emerald-600"></i>
                </div>
                <span class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded-full">Active</span>
              </div>
              <p class="text-2xl font-bold text-slate-800">${activeSubs}</p>
              <p class="text-xs text-slate-500 mt-1">Active Subscriptions</p>
            </div>
            
            <div class="stat-card">
              <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 rounded-xl bg-violet-50 flex items-center justify-center">
                  <i data-lucide="trending-up" class="w-5 h-5 text-violet-600"></i>
                </div>
                <span class="text-xs font-medium text-violet-600 bg-violet-50 px-2 py-1 rounded-full">MYR</span>
              </div>
              <p class="text-2xl font-bold text-slate-800">${totalIncome.toLocaleString()}</p>
              <p class="text-xs text-slate-500 mt-1">Total Income</p>
            </div>
            
            <div class="stat-card">
              <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 rounded-xl ${profit >= 0 ? 'bg-green-50' : 'bg-red-50'} flex items-center justify-center">
                  <i data-lucide="piggy-bank" class="w-5 h-5 ${profit >= 0 ? 'text-green-600' : 'text-red-600'}"></i>
                </div>
                <span class="text-xs font-medium ${profit >= 0 ? 'text-green-600 bg-green-50' : 'text-red-600 bg-red-50'} px-2 py-1 rounded-full">${profit >= 0 ? '+' : ''}${profit.toLocaleString()}</span>
              </div>
              <p class="text-2xl font-bold text-slate-800">${profit.toLocaleString()}</p>
              <p class="text-xs text-slate-500 mt-1">Net Profit</p>
            </div>
          </div>

          <!-- Charts Row -->
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Income vs Expense Mini Chart -->

    function generateMiniChart() {
      const months = ['Jan','Feb','Mar','Apr','May','Jun'];
      const incomeData = [4500, 5200, 4800, 6100, 5500, 7200];
      const expenseData = [2200, 2800, 2400, 3100, 2900, 3500];
      const maxVal = Math.max(...incomeData);

      let bars = '';
      months.forEach((m, i) => {
        const incH = (incomeData[i] / maxVal) * 160;
        const expH = (expenseData[i] / maxVal) * 160;
        bars += `
          <div class="flex-1 flex flex-col items-center gap-1">
            <div class="w-full flex gap-1 items-end justify-center h-[160px]">
              <div class="w-4 bg-emerald-500 rounded-t chart-bar" style="height:${incH}px"></div>
              <div class="w-4 bg-rose-400 rounded-t chart-bar" style="height:${expH}px"></div>
            </div>
            <span class="text-[10px] text-slate-400 font-medium">${m}</span>
          </div>
        `;
      });
      return bars;
    }

    function isExpiringSoon(timestamp) {
      if (!timestamp) return false;
      const date = timestamp.toDate();
      const now = new Date();
      const diffDays = Math.ceil((date - now) / (1000 * 60 * 60 * 24));
      return diffDays <= 7 && diffDays > 0;
    }

    async function handleImgBBUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('image', file);
      
      // Show loading state or use existing IMGBB API key from main site
      const apiKey = 'b71c4d815f32121f479535866ad1de1c'; // Your existing API key
      
      try {
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
          method: 'POST',
          body: formData
        });
        const result = await response.json();
        
        if (result.success) {
          await db.collection('imgbb_images').add({
            url: result.data.url,
            thumbnail: result.data.thumb?.url,
            filename: file.name,
            size: file.size,
            deleteUrl: result.data.delete_url,
            uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          alert('Upload successful!');
          renderImgBB();
        } else {
          alert('Upload failed: ' + result.error.message);
        }
      } catch (error) {
        console.error(error);
        alert('Upload error occurred');
      }
      
      event.target.value = '';
    }

    async function saveClient(e, id) {
      e.preventDefault();
      const form = e.target;
      const data = {
        name: form.name.value,
        email: form.email.value,
        phone: form.phone.value,
        businessType: form.businessType.value,
        plan: form.plan.value,
        status: form.status.value,
        website: form.website.value,
        notes: form.notes.value,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        if (id) {
          await db.collection('clients').doc(id).update(data);
        } else {
          data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          await db.collection('clients').add(data);
        }
        closeModal();
        renderClients();
      } catch (err) {
        alert('Error saving: ' + err.message);
      }
    }

        showPage(currentPage); // Refresh current page
      } catch (err) {
        alert('Error deleting: ' + err.message);
      }
    }

    async function updateRequestStatus(id, status) {
      try {
        await db.collection('client_requests').doc(id).update({ status: status });
        renderRequests();
      } catch (err) {
        alert('Error updating: ' + err.message);
      }
    }

    async function markInvoicePaid(id) {
      try {
        await db.collection('invoices').doc(id).update({ status: 'paid', paidAt: firebase.firestore.FieldValue.serverTimestamp() });
        renderInvoices();
      } catch (err) {
        alert('Error updating: ' + err.message);
      }
    }

    async function cancelSubscription(id) {
      if (!confirm('Cancel this subscription?')) return;
      try {
        await db.collection('subscriptions').doc(id).update({ status: 'cancelled' });
        renderSubscriptions();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function resolveFeedback(id) {
      const resolution = prompt('Enter resolution details:');
      if (!resolution) return;
      try {
        await db.collection('feedback').doc(id).update({ status: 'resolved', resolution: resolution });
        renderFeedback();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function markRenewed(id) {
      try {
        const sub = await db.collection('company_subscriptions').doc(id).get();
        const data = sub.data();
        const currentRenewal = data.renewalDate.toDate();
        const cycle = data.billingCycle === 'year' ? 365 : 30;
        const newDate = new Date(currentRenewal);
        newDate.setDate(newDate.getDate() + cycle);
        
        await db.collection('company_subscriptions').doc(id).update({
          renewalDate: newDate,
          lastRenewed: firebase.firestore.FieldValue.serverTimestamp()
        });
        renderCompanySubs();
        alert('Renewal date updated!');
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // Edit functions (load data into modal)
    async function viewClient(id) {
      const doc = await db.collection('clients').doc(id).get();
      openModal('editClient', { id: doc.id, ...doc.data() });
    }

    async function editClient(id) { viewClient(id); }
    async function editSubscription(id) {
      const doc = await db.collection('subscriptions').doc(id).get();
      openModal('editSubscription', { id: doc.id, ...doc.data() });
    }
    async function editCompanySub(id) {
      const doc = await db.collection('company_subscriptions').doc(id).get();
      openModal('editCompanySub', { id: doc.id, ...doc.data() });
    }
    async function editTeamMember(id) {
      const doc = await db.collection('team').doc(id).get();
      openModal('editTeamMember', { id: doc.id, ...doc.data() });
    }
    async function editEmail(id) {
      const doc = await db.collection('company_emails').doc(id).get();
      openModal('editEmail', { id: doc.id, ...doc.data() });
    }

    async function viewRequest(id) {
      const doc = await db.collection('client_requests').doc(id).get();
      const d = doc.data();
      alert(`Request #${id.slice(0,6)}

Client: ${d.clientName}
Type: ${d.type}
Details: ${d.details}
Price: ${d.price ? 'RM'+d.price : 'N/A'}
Status: ${d.status}`);
    }

    async function viewFeedback(id) {
      const doc = await db.collection('feedback').doc(id).get();
      const f = doc.data();
      alert(`${f.subject}

From: ${f.clientName || 'Anonymous'}
Type: ${f.type}

Message:
 ${f.message}

Status: ${f.status}${f.resolution ? '

Resolution: '+f.resolution : ''}`);
    }

    function downloadInvoice(id) {
      alert('Invoice download feature coming soon!

Invoice ID: INV-' + id.slice(0,8).toUpperCase());
    }

    // ==========================================
    // UTILITY FUNCTIONS
    // ==========================================
    function getStatusBadge(status) {
      const map = {
        'active': '<span class="badge badge-success">Active</span>',
        'inactive': '<span class="badge badge-neutral">Inactive</span>',
        'pending': '<span class="badge badge-warning">Pending</span>',
        'in-progress': '<span class="badge badge-info">In Progress</span>',
        'completed': '<span class="badge badge-success">Completed</span>',
        'paid': '<span class="badge badge-success">Paid</span>',
        'overdue': '<span class="badge badge-danger">Overdue</span>',
        'sent': '<span class="badge badge-info">Sent</span>',
        'cancelled': '<span class="badge badge-danger">Cancelled</span>',
        'paused': '<span class="badge badge-warning">Paused</span>',
        'new': '<span class="badge badge-info">New</span>',
        'resolved': '<span class="badge badge-success">Resolved</span>',
        'onboarding': '<span class="badge badge-info">Onboarding</span>'
      };
      return map[status] || `<span class="badge badge-neutral">${status}</span>`;
    }

    function filterTable(query, tableId) {
      const q = query.toLowerCase();
      document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
        row.style.display = row.dataset.search.includes(q) ? '' : 'none';
      });
    }

    function globalSearch(query) {
      if (query.length < 2) return;
      // Simple global search - could be enhanced
      console.log('Searching for:', query);
    }

    // Initialize Lucide icons after DOM loads
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
    });

  </script>
</body>
</html>
