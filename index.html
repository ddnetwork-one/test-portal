<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Update — Luviio</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(180deg,#fafafa,#f4f4f5);
  font-family: Inter, sans-serif;
}

/* Glass card */
.card {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 24px;
  border: 1px solid rgba(0,0,0,0.05);
}

/* Inputs */
.input {
  width:100%;
  height:52px;
  border-radius:12px;
  padding:0 14px;
  border:1px solid #e5e5e5;
  transition:.2s;
}

.input:focus {
  border-color:#ff005e;
  box-shadow:0 0 0 3px rgba(255,0,94,0.12);
  outline:none;
}

.textarea {
  height:130px;
  padding:12px;
  resize:none;
}

/* Checkbox cards */
.checkbox {
  padding:12px;
  border-radius:14px;
  border:1px solid #eee;
  display:flex;
  gap:10px;
  cursor:pointer;
  transition:.2s;
}

.checkbox:hover {
  border-color:#ff005e;
  background:rgba(255,0,94,0.03);
}

/* Button */
.btn {
  height:54px;
  border-radius:14px;
  background:#ff005e;
  color:white;
  font-weight:600;
  transition:.2s;
}

.btn:hover {
  transform:translateY(-1px);
}

/* Success animation */
.success {
  display:none;
  text-align:center;
  padding:100px 20px;
}

.checkmark {
  width:80px;
  height:80px;
  margin:0 auto 20px;
}

.checkmark circle {
  stroke-dasharray: 251;
  stroke-dashoffset: 251;
  animation: drawCircle 0.6s ease forwards;
}

.checkmark path {
  stroke-dasharray: 50;
  stroke-dashoffset: 50;
  animation: drawCheck 0.4s ease forwards 0.6s;
}

@keyframes drawCircle {
  to { stroke-dashoffset: 0; }
}

@keyframes drawCheck {
  to { stroke-dashoffset: 0; }
}
</style>
</head>

<body>

<div id="app" class="max-w-2xl mx-auto px-6 py-12">

<!-- Header -->
<div class="text-center mb-10">
  <h1 class="text-4xl font-semibold mb-2">Request an Update</h1>
  <p class="text-gray-500 text-sm">
    Tell us what to change. We’ll handle the rest.
  </p>
</div>

<form id="form" action="https://formsubmit.co/forms@luviio.com" method="POST" class="space-y-6">

<input type="hidden" name="_subject" value="Content Update Request">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<!-- INFO -->
<div class="card space-y-4">

<div>
<label class="text-sm font-medium">Full Name *</label>
<input required name="Name" class="input" placeholder="Ahmad Danial">
</div>

<div>
<label class="text-sm font-medium">Email *</label>
<input required type="email" name="Email" class="input" placeholder="you@email.com">
</div>

<div>
<label class="text-sm font-medium">WhatsApp (Optional)</label>
<input name="WhatsApp" class="input" placeholder="+60 12-345 6789">
</div>

<div>
<label class="text-sm font-medium">Website URL *</label>
<input required name="Website" class="input" placeholder="https://yourwebsite.com">
</div>

</div>

<!-- TYPE -->
<div class="card">
<label class="text-sm font-medium mb-3 block">What needs updating?</label>

<div class="grid grid-cols-2 gap-3">
<label class="checkbox"><input type="checkbox" name="Type" value="Text"> Text</label>
<label class="checkbox"><input type="checkbox" name="Type" value="Images"> Images</label>
<label class="checkbox"><input type="checkbox" name="Type" value="Branding"> Branding</label>
<label class="checkbox"><input type="checkbox" name="Type" value="Pricing"> Pricing</label>
<label class="checkbox"><input type="checkbox" name="Type" value="Design"> Design</label>
<label class="checkbox"><input type="checkbox" name="Type" value="New Page"> New Page</label>
</div>
</div>

<!-- DETAILS -->
<div class="card space-y-4">

<div>
<label class="text-sm font-medium">Page / Section *</label>
<input required name="Section" class="input" placeholder="Homepage - Hero Section">
</div>

<div>
<label class="text-sm font-medium">Description *</label>
<textarea required name="Details" class="input textarea"
placeholder="Describe exactly what needs to be updated..."></textarea>
</div>

<div>
<label class="text-sm font-medium">Upload Image (Optional)</label>
<input type="file" id="imageInput" class="input" accept="image/*">
<input type="hidden" name="Image URL" id="imageUrl">
</div>

<div>
<label class="text-sm font-medium">Priority (Optional)</label>
<select name="Priority" class="input">
<option>Normal</option>
<option>Urgent</option>
<option>Critical</option>
</select>
</div>

</div>

<!-- TERMS -->
<div class="flex gap-2 text-sm">
<input type="checkbox" required>
<p>
By submitting, you agree to 
<a href="https://www.luviio.com/terms" target="_blank" class="text-[#ff005e] underline">
Terms of Service
</a>.
</p>
</div>

<button id="btn" class="btn w-full">Submit Request</button>

</form>
</div>

<!-- SUCCESS -->
<div id="success" class="success">

<svg class="checkmark" viewBox="0 0 80 80">
  <circle cx="40" cy="40" r="38" stroke="#22c55e" stroke-width="4" fill="none"/>
  <path d="M22 42 L34 54 L58 28" stroke="#22c55e" stroke-width="4" fill="none"/>
</svg>

<h2 class="text-2xl font-semibold mb-2">Request Submitted</h2>
<p class="text-gray-500 mb-6">We’ll respond within 24 hours.</p>

<div class="text-sm text-gray-500 space-y-1">
<p>support@luviio.com</p>
<p>care@luviio.com</p>
<p>feedback@luviio.com</p>
</div>

</div>

<script>
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const imageInput = document.getElementById("imageInput");
const imageUrl = document.getElementById("imageUrl");

const API = "b71c4d815f32121f479535866ad1de1c";

async function uploadImage(file) {
  const fd = new FormData();
  fd.append("image", file);

  const res = await fetch(`https://api.imgbb.com/1/upload?key=${API}`, {
    method:"POST",
    body:fd
  });

  const data = await res.json();
  return data.data.url;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }

  btn.disabled = true;

  if (imageInput.files[0]) {
    if (imageInput.files[0].size > 5 * 1024 * 1024) {
      alert("Image must be under 5MB");
      btn.disabled = false;
      return;
    }

    btn.innerHTML = "Uploading image...";
    imageUrl.value = await uploadImage(imageInput.files[0]);
  }

  btn.innerHTML = "Submitting...";

  await fetch(form.action, {
    method:"POST",
    body:new FormData(form)
  });

  document.getElementById("app").style.display = "none";
  document.getElementById("success").style.display = "block";
});
</script>

</body>
</html>
