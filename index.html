<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuvTools by Luviio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #EEF2FF;
            --accent: #F59E0B;
            --bg: #FAFBFF;
            --bg-card: #FFFFFF;
            --fg: #0F172A;
            --fg-secondary: #475569;
            --muted: #94A3B8;
            --border: #E2E8F0;
            --border-hover: #CBD5E1;
            --success: #10B981;
            --success-light: #ECFDF5;
            --warning: #F59E0B;
            --warning-light: #FFFBEB;
            --danger: #EF4444;
            --danger-light: #FEF2F2;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --shadow-sm: 0 1px 3px rgba(15,23,42,0.04), 0 1px 2px rgba(15,23,42,0.06);
            --shadow: 0 4px 16px rgba(15,23,42,0.06), 0 2px 4px rgba(15,23,42,0.04);
            --shadow-lg: 0 12px 40px rgba(15,23,42,0.08), 0 4px 12px rgba(15,23,42,0.04);
            --shadow-glow: 0 0 40px rgba(99,102,241,0.15);
        }

        * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); min-height: 100vh; -webkit-font-smoothing: antialiased; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 11px 22px; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px;
            cursor: pointer; transition: all 0.2s cubic-bezier(.4,0,.2,1); border: none; outline: none;
            text-decoration: none; line-height: 1.4;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .btn-primary {
            background: var(--primary); color: #fff;
            box-shadow: 0 1px 3px rgba(99,102,241,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .btn-primary:hover:not(:disabled) { background: var(--primary-dark); box-shadow: 0 4px 16px rgba(99,102,241,0.35); transform: translateY(-1px); }

        .btn-ghost {
            background: transparent; color: var(--fg-secondary); border: 1.5px solid var(--border);
        }
        .btn-ghost:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

        .btn-soft {
            background: var(--primary-light); color: var(--primary);
        }
        .btn-soft:hover:not(:disabled) { background: #E0E7FF; }

        .btn-success { background: var(--success); color: #fff; box-shadow: 0 1px 3px rgba(16,185,129,0.3); }
        .btn-success:hover:not(:disabled) { background: #059669; transform: translateY(-1px); }

        .btn-danger-ghost { background: transparent; color: var(--danger); border: 1.5px solid #FECACA; }
        .btn-danger-ghost:hover { background: var(--danger-light); border-color: var(--danger); }

        .input {
            width: 100%; padding: 11px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
            font-size: 14px; transition: all 0.2s ease; outline: none; background: var(--bg-card); color: var(--fg);
        }
        .input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .input::placeholder { color: var(--muted); }
        select.input { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2394A3B8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 14px center; padding-right: 36px; }
        textarea.input { resize: vertical; min-height: 80px; }

        .card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s ease;
        }
        .card:hover { box-shadow: var(--shadow); }

        .label { display: block; font-size: 13px; font-weight: 600; color: var(--fg-secondary); margin-bottom: 6px; letter-spacing: 0.01em; }

        .badge {
            display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase;
        }
        .badge-pro { background: linear-gradient(135deg, #F59E0B, #F97316); color: #fff; }
        .badge-free { background: var(--primary-light); color: var(--primary); }
        .badge-active { background: var(--success-light); color: var(--success); }
        .badge-suspended { background: var(--danger-light); color: var(--danger); }

        .nav-item {
            display: flex; align-items: center; gap: 8px; color: var(--fg-secondary); text-decoration: none;
            padding: 8px 14px; border-radius: var(--radius-xs); transition: all 0.15s ease; font-size: 14px; font-weight: 500;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { color: var(--primary); background: var(--primary-light); }
        .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

        .page { display: none; }
        .page.active { display: block; }

        .watermark {
            position: absolute; bottom: 16px; right: 16px; color: rgba(148,163,184,0.4);
            font-size: 11px; font-weight: 500; pointer-events: none; letter-spacing: 0.02em;
        }

        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 14px 20px; border-radius: var(--radius-sm); color: #fff; font-weight: 600; font-size: 14px;
            animation: toastIn 0.35s cubic-bezier(.4,0,.2,1); box-shadow: var(--shadow-lg);
            display: flex; align-items: center; gap: 10px; max-width: 380px;
        }
        .toast svg { width: 18px; height: 18px; flex-shrink: 0; }
        @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .fade-in { animation: fadeIn 0.35s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .usage-bar { height: 6px; background: var(--border); border-radius: 100px; overflow: hidden; }
        .usage-bar-fill { height: 100%; border-radius: 100px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

        .tool-preview {
            background: linear-gradient(135deg, #F8FAFF 0%, #F1F5F9 100%);
            border: 2px dashed var(--border); border-radius: var(--radius-sm);
            min-height: 220px; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; transition: border-color 0.2s;
        }
        .tool-preview.has-content { border-style: solid; border-color: var(--primary); background: #fff; }

        .stat-glow { position: relative; overflow: hidden; }
        .stat-glow::before {
            content: ''; position: absolute; top: -40px; right: -40px; width: 120px; height: 120px;
            border-radius: 50%; opacity: 0.12; pointer-events: none;
        }
        .stat-glow.indigo::before { background: var(--primary); }
        .stat-glow.emerald::before { background: var(--success); }
        .stat-glow.amber::before { background: var(--warning); }
        .stat-glow.rose::before { background: var(--danger); }

        .countdown-text { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

        .hero-grid {
            position: absolute; inset: 0; opacity: 0.03;
            background-image: linear-gradient(var(--primary) 1px, transparent 1px), linear-gradient(90deg, var(--primary) 1px, transparent 1px);
            background-size: 60px 60px; mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        @media (max-width: 768px) {
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <nav id="navbar" class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-b border-gray-200/60 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-[60px]">
                <a href="/" onclick="navigate('/'); return false;" class="flex items-center gap-2.5 no-underline">
                    <img src="https://images.luviio.com/luviio-logo-circle-v1.png" alt="Luviio" class="w-9 h-9 rounded-full ring-2 ring-indigo-100">
                    <div class="leading-tight">
                        <span class="font-extrabold text-[17px] tracking-tight">LuvTools</span>
                        <span class="text-[11px] text-gray-400 font-medium block -mt-0.5">by Luviio</span>
                    </div>
                </a>
                <div id="nav-links" class="hidden md:flex items-center gap-1"></div>
                <div id="auth-buttons" class="flex items-center gap-2"></div>
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-gray-100 transition-colors">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden border-t bg-white px-4 py-3 shadow-lg">
            <div id="mobile-nav-links" class="flex flex-col gap-1"></div>
        </div>
    </nav>

    <main id="app" class="pt-[60px] min-h-screen"></main>
    <div id="toast-container" class="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import {
            getAuth, GoogleAuthProvider, createUserWithEmailAndPassword,
            signInWithEmailAndPassword, signInWithPopup, signOut,
            onAuthStateChanged, sendEmailVerification, updateProfile, sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import {
            getFirestore, doc, setDoc, getDoc, updateDoc,
            collection, query, where, getDocs, addDoc, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", authDomain: "appluviio.firebaseapp.com",
            projectId: "appluviio", storageBucket: "appluviio.firebasestorage.app",
            messagingSenderId: "598571208819", appId: "1:598571208819:web:1a91c501b49b3e604d5a06"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        const db = getFirestore(app);

        let currentUser = null, userData = null, currentRoute = '/', demoMode = true;
        let countdownInterval = null;

        const GUEST_LIMIT = 5;
        const routes = {
            public: ['/', '/login', '/register', '/verify'],
            guest_tools: ['/tools/qr', '/tools/resume', '/tools/invoice', '/tools/wa'],
            user: ['/u/dashboard', '/u/qr', '/u/resume', '/u/invoice', '/u/wa', '/u/account'],
            admin: ['/admin/dashboard', '/admin/users', '/admin/analytics', '/admin/templates']
        };

        // ========== USAGE TRACKING ==========
        function getUsageKey(tool) {
            return `luvtools_usage_${tool}_${new Date().toDateString()}`;
        }
        function getUsage(tool) {
            return parseInt(localStorage.getItem(getUsageKey(tool)) || '0');
        }
        function checkUsage(tool) {
            if (currentUser) return { allowed: true, used: 0, remaining: Infinity };
            const used = getUsage(tool);
            if (used >= GUEST_LIMIT) return { allowed: false, used, remaining: 0 };
            return { allowed: true, used, remaining: GUEST_LIMIT - used };
        }
        function incrementUsage(tool) {
            if (currentUser) return;
            const key = getUsageKey(tool);
            localStorage.setItem(key, (getUsage(tool) + 1).toString());
        }
        function getTimeUntilReset() {
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(0, 0, 0, 0);
            const diff = tomorrow - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            return { h: String(h).padStart(2,'0'), m: String(m).padStart(2,'0'), s: String(s).padStart(2,'0') };
        }
        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                document.querySelectorAll('.countdown-text').forEach(el => {
                    const t = getTimeUntilReset();
                    el.textContent = `${t.h}:${t.m}:${t.s}`;
                });
            }, 1000);
        }

        function renderUsageBanner(tool) {
            if (currentUser) return '';
            const usage = checkUsage(tool);
            const t = getTimeUntilReset();
            const pct = (usage.used / GUEST_LIMIT) * 100;
            const barColor = pct >= 80 ? 'var(--danger)' : pct >= 60 ? 'var(--warning)' : 'var(--primary)';
            return `
                <div class="card mb-6 ${usage.allowed ? '' : 'border-amber-300 bg-amber-50/50'}" style="padding:16px 20px;">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 ${usage.allowed ? 'text-indigo-500' : 'text-amber-500'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            <span class="text-sm font-semibold ${usage.allowed ? 'text-gray-700' : 'text-amber-700'}">
                                ${usage.allowed
                                    ? `${usage.used}/${GUEST_LIMIT} uses today`
                                    : `Daily limit reached (${GUEST_LIMIT}/${GUEST_LIMIT})`}
                            </span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-gray-400">Resets in</span>
                            <span class="countdown-text text-xs font-bold text-gray-600 bg-gray-100 px-2 py-0.5 rounded">${t.h}:${t.m}:${t.s}</span>
                        </div>
                    </div>
                    <div class="usage-bar">
                        <div class="usage-bar-fill" style="width:${pct}%; background:${barColor};"></div>
                    </div>
                    ${!usage.allowed ? `
                        <div class="mt-3 flex items-center gap-3">
                            <button onclick="navigate('/register')" class="btn btn-primary text-xs" style="padding:8px 16px;">Sign up for unlimited</button>
                            <span class="text-xs text-gray-500">or wait for daily reset</span>
                        </div>
                    ` : `
                        <div class="mt-2 flex items-center justify-between">
                            <span class="text-xs text-gray-400">${usage.remaining} remaining</span>
                            <a href="#" onclick="navigate('/register'); return false;" class="text-xs text-indigo-600 font-semibold hover:underline">Remove limits →</a>
                        </div>
                    `}
                </div>
            `;
        }

        // ========== HELPERS ==========
        function isVerified() { return (currentUser?.emailVerified || userData?.emailVerified) || demoMode; }
        function isAdmin() { return userData?.role === 'superadmin'; }
        function isPro() { return userData?.plan === 'pro' || userData?.forcePro === true; }
        function hasWatermark() { if (isPro()) return false; if (userData?.watermarkDisabled) return false; if (currentUser) return true; return true; }

        function toolRoute(tool) { return currentUser ? `/u/${tool}` : `/tools/${tool}`; }

        // ========== AUTH ==========
        function setupAuthListener() {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    try {
                        const d = await getDoc(doc(db, 'users', user.uid));
                        userData = d.exists() ? d.data() : {
                            uid: user.uid, name: user.displayName||'User', email: user.email,
                            plan: 'free', role: 'user', suspended: false, forcePro: false,
                            watermarkDisabled: false, emailVerified: user.emailVerified, createdAt: new Date().toISOString()
                        };
                        if (!d.exists()) await setDoc(doc(db, 'users', user.uid), userData);
                    } catch(e) { console.log('Demo mode'); }
                } else { currentUser = null; userData = null; }
                updateNav(); checkRouteAccess();
            });
        }

        // ========== ROUTER ==========
        function setupRouter() {
            window.addEventListener('popstate', () => { currentRoute = window.location.pathname; renderPage(); });
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                document.getElementById('mobile-menu').classList.toggle('hidden');
            });
        }
        function handleInitialRoute() { navigate(window.location.pathname, false); }

        window.navigate = function(path, push = true) {
            if (push) history.pushState(null, '', path);
            currentRoute = path;
            renderPage();
            document.getElementById('mobile-menu').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'instant' });
        };

        function checkRouteAccess() {
            const p = currentRoute;
            if (routes.public.includes(p)) return;
            if (routes.guest_tools.includes(p)) return;
            if (routes.user.some(r => p.startsWith('/u/'))) {
                if (!currentUser) { navigate('/login'); return; }
                if (!isVerified()) { navigate('/verify'); return; }
            }
            if (routes.admin.some(r => p.startsWith('/admin/'))) {
                if (!currentUser || !isVerified() || !isAdmin()) { navigate('/u/dashboard'); return; }
            }
        }

        // ========== NAV ==========
        function updateNav() {
            const nl = document.getElementById('nav-links');
            const mnl = document.getElementById('mobile-nav-links');
            const ab = document.getElementById('auth-buttons');
            let links = '', auth = '';

            if (currentUser && isVerified()) {
                if (isAdmin()) {
                    links = `
                        <a class="nav-item ${currentRoute.startsWith('/admin')?'active':''}" href="#" onclick="navigate('/admin/dashboard');return false;">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>Dashboard</a>
                        <a class="nav-item ${currentRoute==='/admin/users'?'active':''}" href="#" onclick="navigate('/admin/users');return false;">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197"/></svg>Users</a>
                    `;
                } else {
                    links = `
                        <a class="nav-item ${currentRoute==='/u/dashboard'?'active':''}" href="#" onclick="navigate('/u/dashboard');return false;">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>Dashboard</a>
                        <a class="nav-item ${currentRoute.includes('/u/qr')?'active':''}" href="#" onclick="navigate('/u/qr');return false;">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>QR Code</a>
                        <a class="nav-item ${currentRoute.includes('/u/resume')?'active':''}" href="#" onclick="navigate('/u/resume');return false;">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Resume</a>
                        <a class="nav-item ${currentRoute.includes('/u/invoice')?'active':''}" href="#" onclick="navigate('/u/invoice');return false;">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Invoice</a>
                        <a class="nav-item ${currentRoute.includes('/u/wa')?'active':''}" href="#" onclick="navigate('/u/wa');return false;">

                if(!d.exists()) await setDoc(doc(db,'users',r.user.uid),{uid:r.user.uid,name:r.user.displayName||'User',email:r.user.email,plan:'free',role:'user',suspended:false,forcePro:false,watermarkDisabled:false,emailVerified:r.user.emailVerified,createdAt:new Date().toISOString()});
                showToast('Signed in!','success'); navigate('/u/dashboard');
            } catch(err) {
                if(demoMode) { currentUser={uid:'g-demo',email:'demo@google.com',emailVerified:true}; userData={uid:'g-demo',name:'Google User',email:'demo@google.com',plan:'free',role:'user',suspended:false,forcePro:false,watermarkDisabled:false,emailVerified:true,createdAt:new Date().toISOString()}; showToast('Demo: Signed in!','success'); navigate('/u/dashboard'); return; }
                showToast('Google sign-in failed','error');
            }
        };
        window.handleLogout = async function() { try { await signOut(auth); } catch(e){} currentUser=null; userData=null; showToast('Signed out','success'); navigate('/'); };
        window.handleResendVerification = async function() {
            const btn=document.getElementById('resend-btn'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Sending...';
            try { if(currentUser&&!demoMode) await sendEmailVerification(currentUser); showToast('Verification sent!','success'); } catch(e) { showToast('Demo: Would send email','info'); }
            setTimeout(()=>{ btn.disabled=false; btn.textContent='Resend Verification'; },3000);
        };
        window.handleForgotPassword = async function() {
            const email = prompt('Enter your email:'); if(!email) return;
            try { await sendPasswordResetEmail(auth,email); showToast('Reset email sent!','success'); } catch(e) { showToast('Demo: Would send reset email','info'); }
        };
        window.saveAccountChanges = async function() {
            const n=document.getElementById('account-name').value;
            if(n&&userData) { try { if(!demoMode) await updateDoc(doc(db,'users',currentUser.uid),{name:n}); } catch(e){} userData.name=n; showToast('Saved!','success'); updateNav(); }
        };
        window.handleUpgrade = function() {
            showToast('Redirecting to payment...','info');
            setTimeout(()=>{ alert('Payment integration here.\n\nPro: RM 9.90/month\n\nDemo: Upgrading now.'); if(userData){userData.plan='pro';renderPage();showToast('Upgraded to Pro!','success');} },1000);
        };

        // ========== ADMIN ==========
        window.adminChangePlan = async function(uid,plan) { try{if(!demoMode) await updateDoc(doc(db,'users',uid),{plan});}catch(e){} showToast('Plan updated','success'); loadUsersList(); };
        window.adminToggleForcePro = async function(uid,v) { try{if(!demoMode) await updateDoc(doc(db,'users',uid),{forcePro:v});}catch(e){} showToast(v?'Pro granted':'Pro removed','success'); loadUsersList(); };
        window.adminToggleSuspend = async function(uid,v) { try{if(!demoMode) await updateDoc(doc(db,'users',uid),{suspended:v});}catch(e){} showToast(v?'Suspended':'Activated','success'); loadUsersList(); };

        async function loadUsersList() {
            const tb=document.getElementById('users-table-body'); if(!tb) return;
            let users=[];
            try {
                if(!demoMode) { const s=await getDocs(collection(db,'users')); users=s.docs.map(d=>({id:d.id,...d.data()})); }
                else users=[{id:'1',name:'John Doe',email:'john@example.com',plan:'pro',role:'user',suspended:false,forcePro:true,createdAt:'2024-01-15'},{id:'2',name:'Jane Smith',email:'jane@example.com',plan:'free',role:'user',suspended:false,forcePro:false,createdAt:'2024-02-20'},{id:'3',name:'Admin',email:'admin@luviio.com',plan:'pro',role:'superadmin',suspended:false,forcePro:true,createdAt:'2024-01-01'}];
            } catch(e) { users=[]; }
            tb.innerHTML = users.map(u=>`
                <tr>
                    <td><div class="flex items-center gap-2.5"><div class="w-7 h-7 bg-gradient-to-br from-indigo-400 to-purple-400 rounded-lg flex items-center justify-center text-white text-[10px] font-bold">${(u.name||'U')[0]}</div><div><p class="font-semibold text-sm">${u.name}</p><p class="text-xs text-gray-400">${u.email}</p></div></div></td>
                    <td><span class="badge ${u.plan==='pro'?'badge-pro':'badge-free'}">${u.plan}</span></td>
                    <td><span class="badge ${u.suspended?'badge-suspended':'badge-active'}">${u.suspended?'Suspended':'Active'}</span></td>
                    <td><div class="flex gap-1.5">
                        <select onchange="adminChangePlan('${u.id}',this.value)" class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 bg-white cursor-pointer"><option value="free" ${u.plan==='free'?'selected':''}>Free</option><option value="pro" ${u.plan==='pro'?'selected':''}>Pro</option></select>
                        <button onclick="adminToggleForcePro('${u.id}',${!u.forcePro})" class="text-[10px] px-2 py-1.5 rounded-lg font-bold ${u.forcePro?'bg-amber-100 text-amber-700':'bg-gray-100 text-gray-500'}" title="Force Pro">${u.forcePro?'FP ✓':'FP'}</button>
                        <button onclick="adminToggleSuspend('${u.id}',${!u.suspended})" class="text-[10px] px-2 py-1.5 rounded-lg font-bold ${u.suspended?'bg-green-100 text-green-700':'bg-red-50 text-red-500'}">${u.suspended?'Unsuspend':'Suspend'}</button>
                    </div></td>
                </tr>
            `).join('');
        }

        // ========== TOAST ==========
        window.showToast = function(msg, type='info') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            const colors = { success:'#10B981', error:'#EF4444', warning:'#F59E0B', info:'#6366F1' };
            const svgs = {
                success:'<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>',
                error:'<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>',
                warning:'<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>',
                info:'<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
            };
            t.className='toast'; t.style.background=colors[type]||colors.info;
            t.innerHTML=`${svgs[type]||svgs.info}<span>${msg}</span>`;
            c.appendChild(t);
            setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(120%)'; t.style.transition='all 0.3s ease'; setTimeout(()=>t.remove(),300); },3000);
        };

        // ========== INIT ==========
        setupAuthListener();
        setupRouter();
        handleInitialRoute();
    </script>
</body>
</html>
