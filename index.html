<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DDNEX® Portal</title>
    <meta name="description" content="DDNEX® Internal Management Portal">
    <link rel="icon" type="image/png" href="https://i.ibb.co/SD7QzyYw/favicon-white-ddnex.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        /* =========================================
           VARIABLES
           ========================================= */
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: rgba(37, 99, 235, 0.08);
            --primary-glow: rgba(37, 99, 235, 0.3);
            
            --accent-teal: #06b6d4;
            --accent-purple: #7c3aed;
            --accent-orange: #f97316;
            --accent-slate: #0f172a;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-glass: rgba(255, 255, 255, 0.7);
            
            --text-main: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            
            --border-light: #e2e8f0;
            --border-glass: rgba(255, 255, 255, 0.5);
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.15);
            
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
            --font-heading: 'Outfit', system-ui, sans-serif;
            
            --sidebar-width: 280px;
            --sidebar-collapsed: 72px;
            --header-height: 64px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            font-size: 15px;
        }
        a { text-decoration: none; color: inherit; transition: color 0.3s var(--ease); }
        ul { list-style: none; }
        img { max-width: 100%; display: block; }
        button { cursor: pointer; border: none; background: none; font-family: inherit; outline: none; -webkit-tap-highlight-color: transparent; }
        input, select, textarea { font-family: inherit; font-size: 15px; }

        /* =========================================
           LOGIN PAGE
           ========================================= */
        .login-page {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f8fafc 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s var(--ease), visibility 0.5s var(--ease);
        }
        .login-page.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-bg-grid {
            position: absolute;
            inset: 0;
            opacity: 0.4;
            background-image: 
                linear-gradient(to right, rgba(37, 99, 235, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(37, 99, 235, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
        }
        .login-card {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            padding: 48px 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-xl), 0 0 60px rgba(15, 98, 254, 0.1);
            animation: slideUp 0.6s var(--ease-bounce);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; }
        .login-logo img { height: 40px; }
        .login-logo span { font-size: 24px; font-weight: 800; font-family: var(--font-heading); color: var(--text-main); }
        .login-title { text-align: center; margin-bottom: 32px; }
        .login-title h1 { font-size: 20px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; font-family: var(--font-heading); }
        .login-title p { color: var(--text-muted); font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
        .form-input-wrapper { position: relative; }
        .form-input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
            transition: color 0.3s;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            background: white;
            color: var(--text-main);
            transition: all 0.3s var(--ease);
        }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); outline: none; }
        .form-input:focus + i, .form-input-wrapper:has(.form-input:focus) i { color: var(--primary); }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4); }
        .btn-login:active { transform: translateY(0); }

        /* =========================================
           DASHBOARD LAYOUT
           ========================================= */
        .dashboard-app { display: none; min-height: 100vh; }
        .dashboard-app.visible { display: flex; }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid var(--border-light);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: width 0.3s var(--ease);
            box-shadow: var(--shadow-sm);
        }
        .sidebar.collapsed { width: var(--sidebar-collapsed); }
        .sidebar-header {
            height: var(--header-height);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-light);
        }
        .sidebar-logo { display: flex; align-items: center; gap: 10px; overflow: hidden; }
        .sidebar-logo img { height: 32px; flex-shrink: 0; }
        .sidebar-logo span { font-weight: 800; font-size: 18px; font-family: var(--font-heading); white-space: nowrap; transition: opacity 0.2s; }
        .sidebar.collapsed .sidebar-logo span { opacity: 0; width: 0; }
        .sidebar-toggle {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .sidebar-toggle:hover { background: var(--bg-body); color: var(--primary); }
        .sidebar.collapsed .sidebar-toggle i { transform: rotate(180deg); }
        
        .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
        .nav-section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 12px;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            transition: opacity 0.2s;
        }
        .sidebar.collapsed .nav-section-title { opacity: 0; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 4px;
            transition: all 0.2s var(--ease);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .nav-item i { font-size: 20px; flex-shrink: 0; width: 24px; text-align: center; }
        .nav-item span { white-space: nowrap; transition: opacity 0.2s; }
        .sidebar.collapsed .nav-item span { opacity: 0; width: 0; }
        .nav-item:hover { background: var(--bg-body); color: var(--text-main); }
        .nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            width: 3px; height: 24px;
            background: var(--primary);
            border-radius: 0 4px 4px 0;
        }

        .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border-light); }
        .user-mini-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-sm);
            background: var(--bg-body);
            overflow: hidden;
        }
        .user-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }
        .user-info-mini { white-space: nowrap; overflow: hidden; transition: opacity 0.2s; }
        .sidebar.collapsed .user-info-mini { opacity: 0; width: 0; }
        .user-info-mini .name { font-weight: 600; font-size: 14px; }
        .user-info-mini .role { font-size: 12px; color: var(--text-muted); }
        .btn-logout {
            margin-top: 12px;
            width: 100%;
            padding: 10px;
            border-radius: var(--radius-sm);
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-logout:hover { border-color: var(--accent-red); color: var(--accent-red); background: #fef2f2; }
        .btn-logout span { transition: opacity 0.2s; }
        .sidebar.collapsed .btn-logout span { display: none; }

        /* Main Content Area */
        .main-wrapper { flex: 1; margin-left: var(--sidebar-width); transition: margin-left 0.3s var(--ease); }
        .sidebar.collapsed ~ .main-wrapper { margin-left: var(--sidebar-collapsed); }

        /* Top Header */
        .top-header {
            position: sticky;
            top: 0;
            height: var(--header-height);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            z-index: 900;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .page-title-header { font-size: 20px; font-weight: 700; font-family: var(--font-heading); }
        .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
        .breadcrumb a:hover { color: var(--primary); cursor: pointer; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .header-search { position: relative; }
        .header-search input {
            width: 240px;
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--border-light);
            border-radius: 100px;
            background: var(--bg-body);
            font-size: 14px;
            transition: all 0.3s;
        }
        .header-search input:focus { width: 300px; border-color: var(--primary); background: white; outline: none; }
        .header-search i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .header-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 6px;
            border-radius: 100px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .header-user:hover { background: var(--bg-body); }
        .header-user-info { text-align: left; }
        .header-user-info .name { font-weight: 600; font-size: 14px; line-height: 1.2; }
        .header-user-info .role { font-size: 11px; color: var(--text-muted); }

        /* Main Content */
        .main-content { padding: 32px; min-height: calc(100vh - var(--header-height)); }

        /* Section Tabs */
        .section-content { display: none; animation: fadeIn 0.4s var(--ease); }
        .section-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            transition: all 0.3s var(--ease);
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 100px;
            background: radial-gradient(circle at top right, rgba(37, 99, 235, 0.05), transparent 70%);
        }
        .stat-info h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
        .stat-info .value { font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 8px; font-family: var(--font-heading); }
        .stat-info .trend { font-size: 13px; display: flex; align-items: center; gap: 4px; }
        .stat-info .trend.up { color: var(--accent-green); }
        .stat-info .trend.down { color: var(--accent-red); }
        .stat-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .stat-icon.blue { background: #dbeafe; color: #2563eb; }
        .stat-icon.green { background: #dcfce7; color: #16a34a; }
        .stat-icon.purple { background: #f3e8ff; color: #9333ea; }
        .stat-icon.orange { background: #fef3c7; color: #d97706; }

        /* Content Grid */
        .content-grid { display: grid; grid-template-columns: 1fr 380px; gap: 24px; }
        @media(max-width: 1200px) { .content-grid { grid-template-columns: 1fr; } }

        /* Cards */
        .card { background: white; border-radius: var(--radius-md); border: 1px solid var(--border-light); overflow: hidden; box-shadow: var(--shadow-sm); }
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-header h3 { font-size: 16px; font-weight: 700; font-family: var(--font-heading); }
        .card-body { padding: 24px; }
        .card-body.no-padding { padding: 0; }

        /* Tables */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border-light); }
        .data-table th {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg-body);
        }
        .data-table tbody tr { transition: background 0.2s; }
        .data-table tbody tr:hover { background: #fafafa; }
        .data-table td { font-size: 14px; }
        
        /* Status Badges */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
        }
        .status.active, .status.paid { background: #dcfce7; color: #16a34a; }
        .status.pending, .status.quotation { background: #fef3c7; color: #d97706; }
        .status.completed { background: #dbeafe; color: #2563eb; }
        .status.overdue { background: #fef2f2; color: #dc2626; }
        .status.suspended { background: #f1f5f9; color: #64748b; }
        .status i { font-size: 8px; }

        /* Action Buttons */
        .action-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .action-btn:hover { background: var(--bg-body); color: var(--primary); }
        .action-btn.danger:hover { background: #fef2f2; color: var(--accent-red); }

        /* Filter/Search Bar */
        .filter-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .search-box { position: relative; flex: 1; min-width: 200px; }
        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            background: white;
            font-size: 14px;
        }
        .search-box input:focus { border-color: var(--primary); outline: none; }
        .search-box i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .filter-select {
            padding: 12px 16px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            background: white;
            font-size: 14px;
            min-width: 150px;
            cursor: pointer;
        }

        /* Kanban Board */
        .kanban-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; min-height: 500px; }
        @media(max-width: 900px) { .kanban-board { grid-template-columns: 1fr; } }
        .kanban-column {
            background: var(--bg-body);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            flex-direction: column;
        }
        .kanban-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .kanban-header h4 { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; font-family: var(--font-heading); }
        .kanban-header .count { background: white; padding: 2px 8px; border-radius: 100px; font-size: 12px; color: var(--text-muted); }
        .kanban-cards { flex: 1; display: flex; flex-direction: column; gap: 12px; min-height: 100px; }
        .kanban-card {
            background: white;
            padding: 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            cursor: grab;
            transition: all 0.2s var(--ease);
            box-shadow: var(--shadow-sm);
        }
        .kanban-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .kanban-card.dragging { opacity: 0.5; transform: rotate(3deg); }
        .kanban-card h5 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .kanban-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
        .kanban-card .meta { display: flex; align-items: center; justify-content: space-between; }
        .kanban-card .client { font-size: 12px; color: var(--primary); font-weight: 500; }
        .kanban-card .value { font-size: 14px; font-weight: 700; }

        /* Client Cards */
        .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .client-card {
            background: white;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            padding: 24px;
            transition: all 0.3s var(--ease);
            position: relative;
            overflow: hidden;
        }
        .client-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .client-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .client-avatar {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }
        .client-info h4 { font-size: 16px; font-weight: 700; margin-bottom: 4px; font-family: var(--font-heading); }
        .client-info p { font-size: 13px; color: var(--text-muted); }
        .client-details { margin-bottom: 16px; }
        .client-details .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .client-details .detail-item i { color: var(--text-muted); width: 20px; }
        .client-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; border-top: 1px solid var(--border-light); padding-top: 16px;}
        
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s var(--ease);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-outline { border: 1px solid var(--border-light); background: white; color: var(--text-main); }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAwf31b-wpYQwPbd-3DxnqGVRw8g3xq938",
          authDomain: "ddnetwork-database.firebaseapp.com",
          projectId: "ddnetwork-database",
          storageBucket: "ddnetwork-database.firebasestorage.app",
          messagingSenderId: "699127560990",
          appId: "1:699127560990:web:50cfd61ff620bc85fb670f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.firebaseDB = db;

        const getCol = (name) => collection(db, `${name}_ddnex`);

        // Hardcoded Login Logic
        window.handleHardcodedLogin = async (userId, password) => {
            if (userId === '001' && password === '1234') {
                const q = query(getCol('users'), where('userId', '==', '001'));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    await setDoc(doc(db, 'users_ddnex', 'superadmin_001'), {
                        userId: '001',
                        name: 'Super Administrator',
                        email: 'admin@ddnex.com',
                        role: 'SuperAdmin',
                        status: 'active',
                        createdAt: new Date()
                    });
                }

                const userMock = { 
                    uid: 'superadmin_001', 
                    displayName: 'Super Administrator', 
                    email: 'admin@ddnex.com',
                    role: 'SuperAdmin'
                };
                
                window.onUserLoggedIn(userMock);
                return;
            }

            try {
                const q = query(getCol('users'), where('userId', '==', userId));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    const userDoc = querySnapshot.docs[0];
                    const userData = userDoc.data();
                    
                    if (userData.password === password) {
                        if (userData.status === 'suspended') {
                            window.showPopup("Access Denied", "Your account has been suspended.", "error");
                            return;
                        }
                        window.onUserLoggedIn({ 
                            uid: userDoc.id, 
                            displayName: userData.name, 
                            email: userData.email,
                            role: userData.role
                        });
                    } else {
                        window.showPopup("Login Failed", "Invalid User ID or Password.", "error");
                    }
                } else {
                    window.showPopup("Login Failed", "User not found.", "error");

            } catch (error) {
                console.error(error);
                window.showPopup("Error", "Connection error. Try again.", "error");

    <!-- JavaScript Logic -->
    <script>
        // State
        let currentUser = null;
        let currentRoute = '/login/auth';
        let localDataStore = {
            clients: [],
            projects: [],
            invoices: []
        };

        // Router Logic (No #)
        function navigateTo(path) {
            if (!currentUser && path !== '/login/auth') return;
            
            // Update Browser History
            window.history.pushState({}, "", path);
            
            currentRoute = path;
            renderRoute(path);
        }

        window.onpopstate = () => {
            const path = window.location.pathname || '/dashboard';
            if(currentUser) {
                renderRoute(path);
            }
        };

        function renderRoute(path) {
            // Default to dashboard if root
            if(path === '/') path = '/dashboard';

            // Update Sidebar Active State
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeLink = document.querySelector(`.nav-item[data-route="${path}"]`);
            if(activeLink) activeLink.classList.add('active');

            // Breadcrumb & Title
            const titles = {
                '/dashboard': 'Dashboard',
                '/projects': 'Projects',
                '/clients': 'Clients',
                '/sales': 'Sales Pipeline',
                '/cashbill': 'Invoices & Quotations',
                '/settings': 'Settings'
            };
            
            const title = titles[path] || 'Dashboard';
            document.getElementById('pageTitle').textContent = title;
            document.getElementById('breadcrumbCurrent').textContent = title;
            
            // Close mobile sidebar if open
            document.getElementById('sidebar').classList.remove('mobile-open');

            // Route Logic
            showLoading("Loading...");
            setTimeout(() => {
                switch(path) {
                    case '/dashboard': renderDashboardSection(); break;
                    case '/projects': renderProjectsSection(); break;
                    case '/clients': renderClientsSection(); break;
                    case '/sales': renderSalesSection(); break;
                    case '/cashbill': renderCashbillSection(); break;
                    case '/settings': renderSettingsSection(); break;
                    default: renderDashboardSection();
                }
                hideLoading();
            }, 200);
        }

        // Auth Handlers
        window.handleLogin = (e) => {
            e.preventDefault();
            const uid = document.getElementById('userId').value;
            const pass = document.getElementById('password').value;
            
            showLoading("Authenticating...");
            window.handleHardcodedLogin(uid, pass).finally(() => {
                hideLoading();
            });
        };

        window.onUserLoggedIn = (user) => {
            currentUser = user;
            localStorage.setItem('ddnex_user', JSON.stringify(user));
            
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardApp').classList.add('visible');
            
            // Update UI
            const name = user.displayName || user.name || 'User';
            const initials = name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            
            ['sidebar', 'header'].forEach(prefix => {
                const nameEl = document.getElementById(prefix + 'Name');
                const avatarEl = document.getElementById(prefix + 'Avatar');
                const roleEl = document.getElementById(prefix + 'Role');
                if(nameEl) nameEl.textContent = name;
                if(avatarEl) avatarEl.textContent = initials;
                if(roleEl) roleEl.textContent = user.role || 'User';
            });

            navigateTo(window.location.pathname === '/' || window.location.pathname === '/index.html' ? '/dashboard' : window.location.pathname);
        };

            const card = document.getElementById('popupCard');
            const icon = document.getElementById('popupIcon');

            msgEl.innerText = message;

                icon.innerHTML = '<i class="ri-checkbox-circle-fill"></i>';

                </table>

                <div class="print-total">
                    <div class="print-total-row" style="font-size:18px; font-weight:800; font-family:'Outfit',sans-serif;">
                        <span class="print-total-label">Total</span>
                        <span class="print-total-value">${formatMYR(inv.total)}</span>
                    </div>
                </div>

                <div class="print-footer">
                    Thank you for your business. Payment terms: 30 Days. Bank: Maybank | Acc: 123456789
                </div>
            `;

            document.getElementById('printArea').innerHTML = printContent;
            window.print();
        };

        window.deleteInvoice = (id) => {
            showPopup("Delete Document", "Are you sure?", "confirm", async () => {
                await window.dbOperations.deleteInvoice(id);
                renderCashbillSection();
            });
        };

        // --- Deal Actions ---
        window.openDealModal = () => {
             openModal('Add Deal', `
                <div class="form-group-modal"><label>Deal Name</label><input type="text" id="dName"></div>
                <div class="form-group-modal"><label>Client</label><input type="text" id="dClient"></div>
                <div class="form-row">
                    <div class="form-group-modal"><label>Value</label><input type="number" id="dValue"></div>
                    <div class="form-group-modal"><label>Stage</label>
                        <select id="dStage">
                            <option value="leads">Leads</option>
                            <option value="progress">Progress</option>
                            <option value="closed">Closed</option>
                        </select>
                    </div>
                </div>
            `, async () => {
                const data = {
                    name: document.getElementById('dName').value,
                    client: document.getElementById('dClient').value,
                    value: parseFloat(document.getElementById('dValue').value),
                    stage: document.getElementById('dStage').value
                };
                showLoading("Saving...");
                await window.dbOperations.addDeal(data);
                closeModal();
                renderSalesSection();
                hideLoading();
            });
        };

        // --- User Actions (SuperAdmin) ---
        window.openUserModal = (id = null) => {
            openModal('Create User', `
                <div class="form-group-modal"><label>Full Name</label><input type="text" id="uName"></div>
                <div class="form-row">
                    <div class="form-group-modal"><label>User ID</label><input type="text" id="uId"></div>
                    <div class="form-group-modal"><label>Password</label><input type="text" id="uPass"></div>
                </div>
                <div class="form-group-modal"><label>Role</label>
                    <select id="uRole">
                        <option value="Staff">Staff</option>
                        <option value="Manager">Manager</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
            `, async () => {
                const data = {
                    name: document.getElementById('uName').value,
                    userId: document.getElementById('uId').value,
                    password: document.getElementById('uPass').value,
                    email: document.getElementById('uId').value + '@ddnex.com',
                    role: document.getElementById('uRole').value,
                    status: 'active'
                };
                showLoading("Creating User...");
                await window.dbOperations.addUser(data);
                closeModal();
                renderSettingsSection();
                hideLoading();
                showPopup("Success", "User created.");
            });
        };
        
        window.deleteUser = (id) => {
             showPopup("Delete User", "Remove access for this user?", "confirm", async () => {
                 await window.dbOperations.deleteUser(id);
                 renderSettingsSection();
             });
        };

        // --- KANBAN DRAG & DROP ---
        function initKanban() {
            const cards = document.querySelectorAll('.kanban-card');
            const columns = document.querySelectorAll('.kanban-cards');

            cards.forEach(card => {
                card.addEventListener('dragstart', (e) => {
                    card.classList.add('dragging');
                    e.dataTransfer.setData('text/plain', card.dataset.id);
                });
                card.addEventListener('dragend', () => card.classList.remove('dragging'));
            });

            columns.forEach(column => {
                column.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    column.style.background = 'rgba(15, 98, 254, 0.05)';
                });
                column.addEventListener('dragleave', () => column.style.background = '');
                column.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    column.style.background = '';
                    const cardId = e.dataTransfer.getData('text/plain');
                    const newStage = column.dataset.column;
                    
                    if (cardId) {
                        await window.dbOperations.updateDeal(cardId, { stage: newStage });
                        renderSalesSection(); // Reload to update counts
                    }
                });
            });
        }

        // Init
        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('ddnex_user');
            if (savedUser) {
                try {
                    const userObj = JSON.parse(savedUser);
                    window.onUserLoggedIn(userObj);
                } catch (e) {
                    localStorage.removeItem('ddnex_user');
                }
            }
        });

    </script>
</body>
</html>
