<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuvTools by Luviio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-light: #DBEAFE;
            --bg: #FFFFFF;
            --bg-secondary: #F9FAFB;
            --fg: #111827;
            --muted: #6B7280;
            --border: #E5E7EB;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --radius: 12px;
        }
        
        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: var(--bg);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
            background: var(--bg);
        }
        
        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }
        
        .nav-link {
            color: var(--muted);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
        }
        
        .nav-link:hover, .nav-link.active {
            color: var(--primary);
            background: var(--primary-light);
        }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(156, 163, 175, 0.5);
            font-size: 12px;
            pointer-events: none;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: var(--radius);
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .sticky-generate {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.4);
        }
        
        @media (min-width: 768px) {
            .sticky-generate {
                position: static;
                transform: none;
                box-shadow: none;
            }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--primary-light) 0%, white 100%);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--muted);
        }

        .tool-preview {
            background: var(--bg-secondary);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        th {
            font-weight: 600;
            color: var(--muted);
            font-size: 13px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-sm border-b border-gray-200 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" onclick="navigate('/'); return false;" class="flex items-center gap-3">
                    <img src="https://images.luviio.com/luviio-logo-circle-v1.png" alt="Luviio" class="w-10 h-10 rounded-full">
                    <div>
                        <span class="font-bold text-lg">LuvTools</span>
                        <span class="text-gray-400 text-sm hidden sm:inline"> by Luviio</span>
                    </div>
                </a>
                
                <div id="nav-links" class="hidden md:flex items-center gap-2"></div>
                
                <div id="auth-buttons" class="flex items-center gap-3"></div>
                
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-gray-100">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t bg-white px-4 py-4">
            <div id="mobile-nav-links" class="flex flex-col gap-2"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app" class="pt-16 min-h-screen"></main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { 
            getAuth, 
            GoogleAuthProvider,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signInWithPopup,
            signOut,
            onAuthStateChanged,
            sendEmailVerification,
            updateProfile,
            sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { 
            getFirestore,
            doc,
            setDoc,
            getDoc,
            updateDoc,
            collection,
            query,
            where,
            getDocs,
            addDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "appluviio.firebaseapp.com",
            projectId: "appluviio",
            storageBucket: "appluviio.firebasestorage.app",
            messagingSenderId: "598571208819",
            appId: "1:598571208819:web:1a91c501b49b3e604d5a06"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        const db = getFirestore(app);

        // State Management
        let currentUser = null;
        let userData = null;
        let currentRoute = '/';

        // Demo mode flag (set to true if Firebase not configured)
        let demoMode = true;

        // Routes Definition
        const routes = {
            public: ['/', '/login', '/register', '/verify'],
            user: ['/u/dashboard', '/u/qr', '/u/resume', '/u/invoice', '/u/wa', '/u/account'],
            admin: ['/admin/dashboard', '/admin/users', '/admin/analytics', '/admin/templates']
        };

        // Initialize App
        function init() {
            setupAuthListener();
            setupRouter();
            handleInitialRoute();
        }

        // Auth Listener
        function setupAuthListener() {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    try {
                        const userDoc = await getDoc(doc(db, 'users', user.uid));
                        if (userDoc.exists()) {
                            userData = userDoc.data();
                        } else {
                            userData = {
                                uid: user.uid,
                                name: user.displayName || 'User',
                                email: user.email,
                                plan: 'free',
                                role: 'user',
                                suspended: false,
                                forcePro: false,
                                watermarkDisabled: false,
                                emailVerified: user.emailVerified,
                                createdAt: new Date().toISOString()
                            };
                            await setDoc(doc(db, 'users', user.uid), userData);
                        }
                    } catch (e) {
                        console.log('Demo mode - using local state');
                    }
                } else {
                    currentUser = null;
                    userData = null;
                }
                updateNav();
                checkRouteAccess();
            });
        }

        // Router Setup
        function setupRouter() {
            window.addEventListener('popstate', () => {
                currentRoute = window.location.pathname;
                renderPage();
            });
            
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                document.getElementById('mobile-menu').classList.toggle('hidden');
            });
        }

        function handleInitialRoute() {
            const path = window.location.pathname;
            navigate(path, false);
        }

        // Navigation Function
        window.navigate = function(path, pushState = true) {
            if (pushState) {
                history.pushState(null, '', path);
            }
            currentRoute = path;
            renderPage();
            document.getElementById('mobile-menu').classList.add('hidden');
            window.scrollTo(0, 0);
        };

        // Route Access Check
        function checkRouteAccess() {
            const path = currentRoute;
            
            // Public routes - always accessible
            if (routes.public.includes(path)) return;
            
            // User routes
            if (routes.user.some(r => path.startsWith('/u/'))) {
                if (!currentUser) {
                    navigate('/');
                    return;
                }
                if (!isVerified()) {
                    navigate('/verify');
                    return;
                }
                return;
            }
            
            // Admin routes
            if (routes.admin.some(r => path.startsWith('/admin/'))) {
                if (!currentUser) {
                    navigate('/');
                    return;
                }
                if (!isVerified()) {
                    navigate('/verify');
                    return;
                }
                if (!isAdmin()) {
                    navigate('/u/dashboard');
                    return;
                }
            }
        }

        // Helper Functions
        function isVerified() {
            if (demoMode && userData) return true;
            return currentUser?.emailVerified || userData?.emailVerified;
        }

        function isAdmin() {
            return userData?.role === 'superadmin';
        }

        function isPro() {
            return userData?.plan === 'pro' || userData?.forcePro === true;
        }

        function hasWatermark() {
            if (isPro()) return false;
            if (userData?.watermarkDisabled === true) return false;
            return true;
        }

        function checkUsageLimit(tool) {
            if (currentUser) return { allowed: true };
            
            const today = new Date().toDateString();
            const key = `usage_${tool}_${today}`;
            const usage = parseInt(localStorage.getItem(key) || '0');
            
            if (usage >= 5) {
                showToast('Daily limit reached (5 uses). Please sign up for unlimited access!', 'warning');
                return { allowed: false, remaining: 0 };
            }
            
            return { allowed: true, remaining: 5 - usage };
        }

        function incrementUsage(tool) {
            if (currentUser) return;
            
            const today = new Date().toDateString();
            const key = `usage_${tool}_${today}`;
            const usage = parseInt(localStorage.getItem(key) || '0');
            localStorage.setItem(key, usage + 1);
        }

        // Update Navigation
        function updateNav() {
            const navLinks = document.getElementById('nav-links');
            const mobileNavLinks = document.getElementById('mobile-nav-links');
            const authButtons = document.getElementById('auth-buttons');
            
            let linksHTML = '';
            let mobileLinksHTML = '';
            let authHTML = '';
            
            if (currentUser) {
                if (isAdmin()) {
                    linksHTML = `
                        <a href="/admin/dashboard" onclick="navigate('/admin/dashboard'); return false;" class="nav-link ${currentRoute.startsWith('/admin') ? 'active' : ''}">Admin Dashboard</a>
                        <a href="/admin/users" onclick="navigate('/admin/users'); return false;" class="nav-link ${currentRoute === '/admin/users' ? 'active' : ''}">Users</a>
                        <a href="/admin/analytics" onclick="navigate('/admin/analytics'); return false;" class="nav-link ${currentRoute === '/admin/analytics' ? 'active' : ''}">Analytics</a>
                        <a href="/admin/templates" onclick="navigate('/admin/templates'); return false;" class="nav-link ${currentRoute === '/admin/templates' ? 'active' : ''}">Templates</a>
                    `;
                    mobileLinksHTML = linksHTML;
                } else if (isVerified()) {
                    linksHTML = `
                        <a href="/u/dashboard" onclick="navigate('/u/dashboard'); return false;" class="nav-link ${currentRoute === '/u/dashboard' ? 'active' : ''}">Dashboard</a>
                        <a href="/u/qr" onclick="navigate('/u/qr'); return false;" class="nav-link ${currentRoute === '/u/qr' ? 'active' : ''}">QR Generator</a>
                        <a href="/u/resume" onclick="navigate('/u/resume'); return false;" class="nav-link ${currentRoute === '/u/resume' ? 'active' : ''}">Resume Builder</a>
                        <a href="/u/invoice" onclick="navigate('/u/invoice'); return false;" class="nav-link ${currentRoute === '/u/invoice' ? 'active' : ''}">Invoice</a>
                        <a href="/u/wa" onclick="navigate('/u/wa'); return false;" class="nav-link ${currentRoute === '/u/wa' ? 'active' : ''}">WhatsApp</a>
                        <a href="/u/account" onclick="navigate('/u/account'); return false;" class="nav-link ${currentRoute === '/u/account' ? 'active' : ''}">Account</a>
                    `;
                    mobileLinksHTML = linksHTML;
                }
                
                authHTML = `
                    <div class="relative group">
                        <button class="flex items-center gap-2 p-2 rounded-lg hover:bg-gray-100">
                            <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white font-medium text-sm">
                                ${(userData?.name || 'U')[0].toUpperCase()}
                            </div>
                            <span class="hidden sm:inline text-sm font-medium">${userData?.name || 'User'}</span>
                            ${isPro() ? '<span class="bg-yellow-400 text-yellow-900 text-xs px-2 py-0.5 rounded-full font-semibold">PRO</span>' : ''}
                        </button>
                        <div class="absolute right-0 top-full mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-200 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
                            <a href="/u/account" onclick="navigate('/u/account'); return false;" class="block px-4 py-3 hover:bg-gray-50 text-sm">My Account</a>
                            <button onclick="handleLogout()" class="w-full text-left px-4 py-3 hover:bg-gray-50 text-sm text-red-600">Sign Out</button>
                        </div>
                    </div>
                `;
            } else {
                linksHTML = `
                    <a href="#features" class="nav-link">Features</a>
                    <a href="#tools" class="nav-link">Tools</a>
                    <a href="#pricing" class="nav-link">Pricing</a>
                `;
                mobileLinksHTML = linksHTML;
                
                authHTML = `
                    <button onclick="navigate('/login')" class="btn-secondary hidden sm:block">Sign In</button>
                    <button onclick="navigate('/register')" class="btn-primary">Get Started</button>
                `;
            }
            
            navLinks.innerHTML = linksHTML;
            mobileNavLinks.innerHTML = mobileLinksHTML;
            authButtons.innerHTML = authHTML;
        }

        // Render Page
        function renderPage() {
            const app = document.getElementById('app');
            updateNav();
            checkRouteAccess();
            
            switch(currentRoute) {
                case '/': app.innerHTML = renderLanding(); break;
                case '/login': app.innerHTML = renderLogin(); break;
                case '/register': app.innerHTML = renderRegister(); break;
                case '/verify': app.innerHTML = renderVerify(); break;
                case '/u/dashboard': app.innerHTML = renderDashboard(); break;
                case '/u/qr': app.innerHTML = renderQRGenerator(); break;
                case '/u/resume': app.innerHTML = renderResumeBuilder(); break;
                case '/u/invoice': app.innerHTML = renderInvoiceGenerator(); break;
                case '/u/wa': app.innerHTML = renderWAGenerator(); break;
                case '/u/account': app.innerHTML = renderAccount(); break;
                case '/admin/dashboard': app.innerHTML = renderAdminDashboard(); break;
                case '/admin/users': app.innerHTML = renderAdminUsers(); break;
                case '/admin/analytics': app.innerHTML = renderAdminAnalytics(); break;
                case '/admin/templates': app.innerHTML = renderAdminTemplates(); break;
                default: app.innerHTML = render404();
            }
        }

        // Landing Page
        function renderLanding() {
            return `
                <div class="fade-in">
                    <!-- Hero Section -->
                    <section class="py-20 px-4 bg-gradient-to-br from-blue-50 via-white to-indigo-50">
                        <div class="max-w-6xl mx-auto text-center">
                            <div class="inline-flex items-center gap-2 bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-sm font-medium mb-8">
                                <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                                Trusted by 10,000+ users worldwide
                            </div>
                            <h1 class="text-4xl md:text-6xl font-bold mb-6 leading-tight">
                                Simple tools for your<br>
                                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">digital identity & business</span>
                            </h1>
                            <p class="text-xl text-gray-600 max-w-2xl mx-auto mb-10">
                                Generate QR codes, build professional resumes, create invoices, and craft WhatsApp links — all in one place.
                            </p>
                            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                                <button onclick="navigate('/register')" class="btn-primary text-lg px-8 py-4">
                                    Start Free Today
                                    <svg class="inline ml-2 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                                </button>
                                <button onclick="document.getElementById('tools').scrollIntoView({behavior:'smooth'})" class="btn-secondary text-lg px-8 py-4">
                                    Explore Tools
                                </button>
                            </div>
                            
                            <div class="mt-16 relative">
                                <div class="absolute inset-0 bg-gradient-to-r from-blue-200 to-indigo-200 rounded-2xl blur-3xl opacity-30"></div>
                                <div class="relative bg-white rounded-2xl shadow-2xl p-8 max-w-4xl mx-auto border border-gray-100">
                                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                                        <div class="text-center p-4">
                                            <div class="w-14 h-14 mx-auto bg-blue-100 rounded-xl flex items-center justify-center mb-3">
                                                <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
                                            </div>
                                            <h3 class="font-semibold">QR Codes</h3>
                                            <p class="text-sm text-gray-500">Instant generation</p>
                                        </div>
                                        <div class="text-center p-4">
                                            <div class="w-14 h-14 mx-auto bg-green-100 rounded-xl flex items-center justify-center mb-3">
                                                <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                            </div>
                                            <h3 class="font-semibold">Resumes</h3>
                                            <p class="text-sm text-gray-500">Professional templates</p>
                                        </div>
                                        <div class="text-center p-4">
                                            <div class="w-14 h-14 mx-auto bg-purple-100 rounded-xl flex items-center justify-center mb-3">
                                                <svg class="w-7 h-7 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                                            </div>
                                            <h3 class="font-semibold">Invoices</h3>
                                            <p class="text-sm text-gray-500">Auto-calculated</p>
                                        </div>

        // ==================== TOOL FUNCTIONS ====================

        // QR Generator Functions
        window.updateQRPlaceholder = function() {
            const type = document.getElementById('qr-type').value;
            const placeholders = {
                url: 'https://example.com',
                text: 'Enter your text here...',
                email: 'your@email.com',
                phone: '+60 12 345 6789'
            };
            document.getElementById('qr-content').placeholder = placeholders[type];
        };

        window.generateQR = async function() {
            const btn = document.getElementById('qr-generate-btn');
            const limitCheck = checkUsageLimit('qr');
            if (!limitCheck.allowed) return;
            
            const content = document.getElementById('qr-content').value.trim();
            if (!content) {
                showToast('Please enter content for the QR code', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Generating...';
            
            await new Promise(r => setTimeout(r, 800));
            
            const size = parseInt(document.getElementById('qr-size').value);
            const color = document.getElementById('qr-color').value;
            const preview = document.getElementById('qr-preview');
            
            try {
                preview.innerHTML = '';
                const canvas = document.createElement('canvas');
                await QRCode.toCanvas(canvas, content, {
                    width: size,
                    margin: 2,
                    color: { dark: color, light: '#ffffff' }
                });
                canvas.id = 'qr-canvas';
                canvas.style.maxWidth = '100%';
                canvas.style.height = 'auto';
                preview.appendChild(canvas);
                
                if (hasWatermark()) {
                    const wm = document.createElement('div');
                    wm.className = 'watermark';
                    wm.textContent = 'LuvTools by Luviio';
                    preview.appendChild(wm);
                }
                
                document.getElementById('qr-actions').classList.remove('hidden');
                document.getElementById('qr-actions').classList.add('flex');
                incrementUsage('qr');
                showToast('QR code generated successfully!', 'success');
            } catch (e) {
                showToast('Error generating QR code', 'error');
            }
            
            btn.disabled = false;
            btn.textContent = 'Generate QR Code';
        };

        window.downloadQR = function() {
            const canvas = document.getElementById('qr-canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = 'qrcode-' + Date.now() + '.png';
                link.href = canvas.toDataURL();
                link.click();
                showToast('QR code downloaded!', 'success');
            }
        };

        window.copyQR = function() {
            const canvas = document.getElementById('qr-canvas');
            if (canvas) {
                canvas.toBlob(blob => {
                    navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                    showToast('QR code copied to clipboard!', 'success');
                });
            }
        };

        // Resume Builder Functions
        window.addExperience = function() {
            const container = document.getElementById('resume-experience');

        };

        window.handleForgotPassword = async function() {
            const email = prompt('Enter your email address:');
            if (email) {
                try {
                    await sendPasswordResetEmail(auth, email);
                    showToast('Password reset email sent!', 'success');
                } catch (e) {
                    showToast('Demo mode: Reset email would be sent', 'info');
                }
            }
        };

        window.saveAccountChanges = async function() {
            const newName = document.getElementById('account-name').value;
            if (newName && userData) {
                try {
                    if (!demoMode) {
                        await updateDoc(doc(db, 'users', currentUser.uid), { name: newName });
                    }
                    userData.name = newName;
                    showToast('Account updated successfully!', 'success');
                    updateNav();
                } catch (e) {
                    showToast('Changes saved locally (demo mode)', 'success');
                    userData.name = newName;
                    updateNav();
                }
            }
        };

        window.handleUpgrade = function() {
            showToast('Redirecting to payment...', 'info');
            // In production, integrate with payment gateway like Stripe or SenangPay for RM
            setTimeout(() => {
                alert('Payment integration would go here.\n\nPro Plan: RM 9.90/month\n\nFor demo purposes, your account will be upgraded.');
                if (userData) {
                    userData.plan = 'pro';
                    renderPage();
                    showToast('Upgraded to Pro! Enjoy all features.', 'success');
                }
            }, 1000);
        };

        // ==================== ADMIN FUNCTIONS ====================

        window.adminChangePlan = async function(uid, newPlan) {
            try {
                if (!demoMode) {
                    await updateDoc(doc(db, 'users', uid), { plan: newPlan });
                }
                showToast(`User plan changed to ${newPlan}`, 'success');
                loadUsersList();
            } catch (e) {
                showToast('Failed to update plan', 'error');
            }
        };

        window.adminToggleForcePro = async function(uid, value) {
            try {
                if (!demoMode) {
                    await updateDoc(doc(db, 'users', uid), { forcePro: value });
                }
                showToast(value ? 'Pro granted!' : 'Pro grant removed', 'success');
                loadUsersList();
            } catch (e) {
                showToast('Failed to update', 'error');
            }
        };

        window.adminToggleWatermark = async function(uid, value) {
            try {
                if (!demoMode) {
                    await updateDoc(doc(db, 'users', uid), { watermarkDisabled: value });
                }
                showToast(value ? 'Watermark disabled' : 'Watermark enabled', 'success');
                loadUsersList();
            } catch (e) {
                showToast('Failed to update', 'error');
            }
        };

        window.adminToggleSuspend = async function(uid, value) {
            try {
                if (!demoMode) {
                    await updateDoc(doc(db, 'users', uid), { suspended: value });
                }
                showToast(value ? 'User suspended' : 'User activated', 'success');
                loadUsersList();
            } catch (e) {
                showToast('Failed to update', 'error');
            }
        };

        async function loadUsersList() {
            const tbody = document.getElementById('users-table-body');
            if (!tbody) return;
            
            try {
                let users = [];
                if (!demoMode) {
                    const q = query(collection(db, 'users'));
                    const snapshot = await getDocs(q);
                    users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } else {
                    // Demo data
                    users = [
                        { id: '1', name: 'John Doe', email: 'john@example.com', plan: 'pro', role: 'user', suspended: false, forcePro: true, watermarkDisabled: true, createdAt: '2024-01-15' },
                        { id: '2', name: 'Jane Smith', email: 'jane@example.com', plan: 'free', role: 'user', suspended: false, forcePro: false, watermarkDisabled: false, createdAt: '2024-02-20' },
                        { id: '3', name: 'Admin User', email: 'admin@luviio.com', plan: 'pro', role: 'superadmin', suspended: false, forcePro: true, watermarkDisabled: true, createdAt: '2024-01-01' },
                    ];
                }
                
                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td>
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-sm font-medium">
                                    ${(user.name || 'U')[0].toUpperCase()}
                                </div>
                                <span class="font-medium">${user.name}</span>
                            </div>
                        </td>
                        <td>${user.email}</td>
                        <td>
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${user.plan === 'pro' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-700'}">
                                ${user.plan === 'pro' ? 'PRO' : 'Free'}
                            </span>
                        </td>
                        <td>
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${user.suspended ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">
                                ${user.suspended ? 'Suspended' : 'Active'}
                            </span>
                        </td>
                        <td class="text-gray-500">${new Date(user.createdAt).toLocaleDateString()}</td>
                        <td>
                            <div class="flex gap-1">
                                <select onchange="adminChangePlan('${user.id}', this.value)" class="text-xs border rounded px-2 py-1">
                                    <option value="free" ${user.plan === 'free' ? 'selected' : ''}>Free</option>
                                    <option value="pro" ${user.plan === 'pro' ? 'selected' : ''}>Pro</option>
                                </select>
                                <button onclick="adminToggleForcePro('${user.id}', ${!user.forcePro})" class="text-xs px-2 py-1 rounded ${user.forcePro ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100'}" title="Force Pro">
                                    ${user.forcePro ? 'FP+' : 'FP'}
                                </button>
                                <button onclick="adminToggleSuspend('${user.id}', ${!user.suspended})" class="text-xs px-2 py-1 rounded ${user.suspended ? 'bg-red-100 text-red-700' : 'bg-gray-100'}" title="Suspend">
                                    ${user.suspended ? 'Unsuspend' : 'Suspend'}
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-red-500">Error loading users</td></tr>';
            }
        }

        // ==================== TOAST SYSTEM ====================

        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const colors = {
                success: '#10B981',
                error: '#EF4444',
                warning: '#F59E0B',
                info: '#3B82F6'
            };
            
            toast.className = 'toast';
            toast.style.background = colors[type] || colors.info;
            toast.textContent = message;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // Initialize app
        init();

        // Load admin users list when on that page
        const originalRenderPage = renderPage;
        window.renderPage = function() {
            originalRenderPage();
            if (currentRoute === '/admin/users') {
                setTimeout(loadUsersList, 100);
            }
        };
    </script>
</body>
</html>
