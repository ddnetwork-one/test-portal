<html lang="en">
<head>

<title>Luviio — Simple tools for your digital identity & business</title>
<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  :root {
    --accent: #3B82F6;
    --accent-hover: #2563EB;
    --accent-light: #EFF6FF;
    --accent-subtle: #DBEAFE;
    --bg: #FFFFFF;
    --bg-secondary: #F8FAFC;
    --text: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --card: #FFFFFF;
    --success: #22C55E;
    --danger: #EF4444;
    --warning: #F59E0B;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Plus Jakarta Sans',system-ui,sans-serif; color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased; }
  .page { display:none; opacity:0; transition:opacity .3s ease; }
  .page.active { display:block; opacity:1; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 24px; border-radius:12px; font-weight:600; font-size:14px; border:none; cursor:pointer; transition:all .2s ease; text-decoration:none; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent-hover); transform:translateY(-1px); box-shadow:0 4px 12px rgba(59,130,246,.3); }
  .btn-secondary { background:var(--bg-secondary); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { background:var(--border); }
  .btn-ghost { background:transparent; color:var(--text-secondary); }
  .btn-ghost:hover { background:var(--bg-secondary); color:var(--text); }
  .btn-danger { background:#FEF2F2; color:var(--danger); }
  .btn-danger:hover { background:#FEE2E2; }
  .btn-sm { padding:6px 14px; font-size:13px; border-radius:8px; }
  .btn-lg { padding:14px 32px; font-size:16px; border-radius:14px; }
  .input { width:100%; padding:10px 16px; border:1.5px solid var(--border); border-radius:12px; font-size:14px; font-family:inherit; transition:all .2s; background:var(--bg); color:var(--text); outline:none; }
  .input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,.1); }
  .input::placeholder { color:var(--text-muted); }
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; }
  .card-hover { transition:all .25s ease; }
  .card-hover:hover { border-color:var(--accent-subtle); box-shadow:0 8px 30px rgba(0,0,0,.06); transform:translateY(-2px); }
  .label { display:block; font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
  .toast-container { position:fixed; top:20px; right:20px; z-index:10000; display:flex; flex-direction:column; gap:8px; }
  .toast { padding:14px 20px; border-radius:12px; font-size:14px; font-weight:500; display:flex; align-items:center; gap:10px; animation:slideIn .3s ease; min-width:280px; box-shadow:0 8px 30px rgba(0,0,0,.12); }
  .toast-success { background:#F0FDF4; color:#166534; border:1px solid #BBF7D0; }
  .toast-error { background:#FEF2F2; color:#991B1B; border:1px solid #FECACA; }
  .toast-info { background:var(--accent-light); color:#1E40AF; border:1px solid var(--accent-subtle); }
  @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  @keyframes slideOut { from { transform:translateX(0); opacity:1; } to { transform:translateX(100%); opacity:0; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
  @keyframes pulse-ring { 0% { transform:scale(.9); opacity:1; } 100% { transform:scale(1.4); opacity:0; } }
  .fade-up { animation:fadeUp .6s ease both; }
  .fade-up-1 { animation-delay:.1s; }
  .fade-up-2 { animation-delay:.2s; }
  .fade-up-3 { animation-delay:.3s; }
  .fade-up-4 { animation-delay:.4s; }
  .nav-link { padding:8px 16px; border-radius:10px; font-size:14px; font-weight:500; color:var(--text-secondary); transition:all .2s; cursor:pointer; text-decoration:none; }
  .nav-link:hover { color:var(--text); background:var(--bg-secondary); }
  .nav-link.active { color:var(--accent); background:var(--accent-light); }
  .tool-icon { width:56px; height:56px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; }
  .stat-card { text-align:center; padding:20px; }
  .stat-number { font-size:32px; font-weight:800; color:var(--text); line-height:1; }
  .stat-label { font-size:13px; color:var(--text-muted); margin-top:6px; }
  .link-item { display:flex; align-items:center; gap:12px; padding:12px; border:1px solid var(--border); border-radius:12px; cursor:grab; transition:all .2s; }
  .link-item:hover { border-color:var(--accent-subtle); background:var(--accent-light); }
  .link-item.dragging { opacity:.5; transform:scale(.98); }
  .link-item .drag-handle { color:var(--text-muted); cursor:grab; }
  .preview-phone { width:320px; min-height:580px; background:#fff; border:8px solid #1a1a1a; border-radius:40px; overflow:hidden; position:relative; }
  .preview-phone::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:100px; height:24px; background:#1a1a1a; border-radius:0 0 16px 16px; z-index:10; }
  .pricing-card { border:1.5px solid var(--border); border-radius:20px; padding:32px; }
  .pricing-card.featured { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent), 0 12px 40px rgba(59,130,246,.12); }
  .badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); backdrop-filter:blur(4px); z-index:9000; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal { background:#fff; border-radius:20px; padding:32px; max-width:440px; width:100%; box-shadow:0 25px 60px rgba(0,0,0,.15); }
  .hero-gradient { background:radial-gradient(ellipse at 50% 0%, rgba(59,130,246,.08) 0%, transparent 60%); }
  .grid-bg { background-image:radial-gradient(circle, #e2e8f0 1px, transparent 1px); background-size:24px 24px; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }
  @media(max-width:768px) {
    .preview-phone { width:280px; min-height:500px; border-width:6px; border-radius:32px; }
    .preview-phone::before { width:80px; height:20px; }
    .stat-number { font-size:24px; }
    .card { padding:18px; }
    .btn-lg { padding:12px 24px; font-size:15px; }
  }
  @media print { .no-print { display:none!important; } }
</style>
</head>
<body>
<div id="toast-container" class="toast-container"></div>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, query, collection, where, getDocs, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";

/* ─── Firebase Init ─── */
const firebaseConfig = {
  apiKey: "AIzaSyDSp-HX00hZaJwTFaZ4X06pU7pARGjhl1M",
  authDomain: "appluviio.firebaseapp.com",
  projectId: "appluviio",
  storageBucket: "appluviio.firebasestorage.app",
  messagingSenderId: "598571208819",
  appId: "1:598571208819:web:1a91c501b49b3e604d5a06",
  measurementId: "G-MZ96FCCJ1K"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let analytics = null;
try { analytics = getAnalytics(app); } catch(e) {}
const track = (name, data={}) => { try { logEvent(analytics, name, data); } catch(e) {} };

const provider = new GoogleAuthProvider();
const $ = id => document.getElementById(id);
const appEl = $('app');

/* ─── State ─── */
let currentUser = null;
let userData = null;
let currentPage = 'landing';

const bioState = { name:'', bio:'', avatar:'', links:[{id:1,title:'WhatsApp',url:'https://wa.me/',icon:'fa-brands fa-whatsapp',color:'#25D366'},{id:2,title:'TikTok',url:'https://tiktok.com/@',icon:'fa-brands fa-tiktok',color:'#000000'},{id:3,title:'Shopee',url:'https://shopee.com/',icon:'fa-solid fa-bag-shopping',color:'#EE4D2D'}] };
const resumeState = { fullName:'', email:'', phone:'', summary:'', experiences:[{company:'',role:'',period:'',desc:''}], skills:[], education:[{school:'',degree:'',year:''}] };
const invoiceState = { from:{name:'',email:'',phone:'',address:''}, to:{name:'',email:'',phone:'',address:''}, items:[{desc:'',qty:1,price:0}], date:new Date().toISOString().split('T')[0], invoiceNo:'INV-001', notes:'' };

const linkPresets = [
  {title:'WhatsApp',url:'https://wa.me/',icon:'fa-brands fa-whatsapp',color:'#25D366'},
  {title:'TikTok',url:'https://tiktok.com/@',icon:'fa-brands fa-tiktok',color:'#000000'},
  {title:'Instagram',url:'https://instagram.com/',icon:'fa-brands fa-instagram',color:'#E4405F'},
  {title:'Shopee',url:'https://shopee.com/',icon:'fa-solid fa-bag-shopping',color:'#EE4D2D'},
  {title:'YouTube',url:'https://youtube.com/@',icon:'fa-brands fa-youtube',color:'#FF0000'},
  {title:'Twitter / X',url:'https://x.com/',icon:'fa-brands fa-x-twitter',color:'#000000'},
  {title:'LinkedIn',url:'https://linkedin.com/in/',icon:'fa-brands fa-linkedin',color:'#0A66C2'},
  {title:'Website',url:'https://',icon:'fa-solid fa-globe',color:'#3B82F6'},
  {title:'Email',url:'mailto:',icon:'fa-solid fa-envelope',color:'#64748B'},
  {title:'Custom',url:'',icon:'fa-solid fa-link',color:'#6366F1'},
];

/* ─── Toast ─── */
function toast(msg, type='info') {
  const c = $('toast-container');
  const icons = {success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<i class="fa-solid ${icons[type]}"></i><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{ t.style.animation='slideOut .3s ease forwards'; setTimeout(()=>t.remove(),300); },3500);
}

/* ─── Modal ─── */
function showModal(title, body, actions='') {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">${title}</h3><div style="color:var(--text-secondary);font-size:14px;line-height:1.6">${body}</div><div style="display:flex;gap:10px;margin-top:24px;justify-content:flex-end">${actions}</div></div>`;
    overlay.addEventListener('click', e => { if(e.target===overlay){ overlay.remove(); resolve(false); } });
    document.body.appendChild(overlay);
  });
}

/* ─── Auth ─── */
async function registerEmail(name, email, password) {
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    const username = email.split('@')[0].replace(/[^a-z0-9]/gi,'').toLowerCase() + Math.floor(Math.random()*1000);
    await setDoc(doc(db,'users',cred.user.uid), { uid:cred.user.uid, name, email, username, stats:{bioViews:0,qrScans:0,linkClicks:0}, plan:'free', createdAt:serverTimestamp() });
    track('sign_up',{method:'email'});
    toast('Account created successfully!','success');
  } catch(e) {
    const msgs = { 'auth/email-already-in-use':'This email is already registered','auth/weak-password':'Password must be at least 6 characters','auth/invalid-email':'Invalid email address' };
    toast(msgs[e.code] || e.message,'error');
  }
}

async function loginEmail(email, password) {
  try {
    await signInWithEmailAndPassword(auth, email, password);
    track('login',{method:'email'});
    toast('Welcome back!','success');
  } catch(e) {
    const msgs = { 'auth/user-not-found':'No account found with this email','auth/wrong-password':'Incorrect password','auth/invalid-credential':'Invalid email or password','auth/invalid-email':'Invalid email address' };
    toast(msgs[e.code] || e.message,'error');
  }
}

async function loginGoogle() {
  try {
    const result = await signInWithPopup(auth, provider);
    const userRef = doc(db,'users',result.user.uid);
    const userSnap = await getDoc(userRef);
    if(!userSnap.exists()) {
      const username = result.user.email.split('@')[0].replace(/[^a-z0-9]/gi,'').toLowerCase() + Math.floor(Math.random()*1000);
      await setDoc(userRef, { uid:result.user.uid, name:result.user.displayName||'', email:result.user.email, username, stats:{bioViews:0,qrScans:0,linkClicks:0}, plan:'free', createdAt:serverTimestamp() });
      track('sign_up',{method:'google'});
      toast('Account created with Google!','success');
    } else {
      track('login',{method:'google'});
      toast('Welcome back!','success');
    }
  } catch(e) {
    if(e.code!=='auth/popup-closed-by-user') toast(e.message,'error');
  }
}

async function logoutUser() {
  await signOut(auth);
  toast('Signed out','info');
}

/* ─── Firestore Helpers ─── */
async function loadUser(uid) {
  const snap = await getDoc(doc(db,'users',uid));
  if(snap.exists()) return snap.data();
  return null;
}

async function saveBioData(uid) {
  try { await setDoc(doc(db,'users',uid,'data','bio'), bioState); } catch(e) { console.error(e); }
}

async function loadBioData(uid) {
  try {
    const snap = await getDoc(doc(db,'users',uid,'data','bio'));
    if(snap.exists()) Object.assign(bioState, snap.data());
  } catch(e) { console.error(e); }
}

async function saveResumeData(uid) {
  try { await setDoc(doc(db,'users',uid,'data','resume'), resumeState); } catch(e) { console.error(e); }
}

async function loadResumeData(uid) {
  try {
    const snap = await getDoc(doc(db,'users',uid,'data','resume'));
    if(snap.exists()) Object.assign(resumeState, snap.data());
  } catch(e) { console.error(e); }
}

async function saveInvoiceData(uid) {
  try { await setDoc(doc(db,'users',uid,'data','invoice'), invoiceState); } catch(e) { console.error(e); }
}

async function loadInvoiceData(uid) {
  try {
    const snap = await getDoc(doc(db,'users',uid,'data','invoice'));
    if(snap.exists()) Object.assign(invoiceState, snap.data());
  } catch(e) { console.error(e); }
}

async function updateUsername(uid, newUsername) {
  const clean = newUsername.toLowerCase().replace(/[^a-z0-9._-]/g,'');
  if(!clean || clean.length<3) { toast('Username must be at least 3 characters (letters, numbers, . _ -)','error'); return false; }
  if(clean.length>20) { toast('Username too long','error'); return false; }
  const q = query(collection(db,'users'), where('username','==',clean));
  const snap = await getDocs(q);
  if(!snap.empty) { for(const d of snap.docs) { if(d.id!==uid) { toast('Username already taken','error'); return false; } } }
  await updateDoc(doc(db,'users',uid), { username:clean });
  userData.username = clean;
  toast('Username updated!','success');
  track('update_username');
  return true;
}

async function loadPublicProfile(username) {
  const q = query(collection(db,'users'), where('username','==',username));
  const snap = await getDocs(q);
  if(!snap.empty) {
    const user = snap.docs[0].data();
    const bioSnap = await getDoc(doc(db,'users',snap.docs[0].id,'data','bio'));
    const bio = bioSnap.exists() ? bioSnap.data() : null;
    await updateDoc(doc(db,'users',snap.docs[0].id), { 'stats.bioViews': increment(1) });
    return { ...user, bio };
  }
  return null;
}

/* ─── Router ─── */
function navigate(page, params={}) {
  currentPage = page;
  window.scrollTo({top:0,behavior:'smooth'});
  if(page==='landing') { window.history.pushState({},'','/'); render(); }
  else if(page==='login') { window.history.pushState({},'',('/login')); render(); }
  else if(page==='register') { window.history.pushState({},'','/register'); render(); }
  else if(page==='dashboard') { window.history.pushState({},'','/dashboard'); render(); }
  else if(page==='bio') { window.history.pushState({},'','/bio'); render(); }
  else if(page==='qr') { window.history.pushState({},'','/qr'); render(); }
  else if(page==='resume') { window.history.pushState({},'','/resume'); render(); }
  else if(page==='invoice') { window.history.pushState({},'','/invoice'); render(); }
  else if(page==='pricing') { window.history.pushState({},'','/pricing'); render(); }
  else if(page==='profile') { window.history.pushState({},'','/'+params.username); renderProfile(params.username); }
  else render();
}

window.addEventListener('popstate', () => {
  const path = window.location.pathname;
  if(path==='/' || path==='') currentPage='landing';
  else if(path==='/login') currentPage='login';
  else if(path==='/register') currentPage='register';
  else if(path==='/dashboard') currentPage='dashboard';
  else if(path==='/bio') currentPage='bio';
  else if(path==='/qr') currentPage='qr';
  else if(path==='/resume') currentPage='resume';
  else if(path==='/invoice') currentPage='invoice';
  else if(path==='/pricing') currentPage='pricing';
  else if(path.startsWith('/')) { currentPage='profile'; renderProfile(path.slice(1)); return; }
  render();
});

/* ─── Auth State ─── */
onAuthStateChanged(auth, async user => {
  currentUser = user;
  if(user) {
    userData = await loadUser(user.uid);
    if(!userData) { userData = { uid:user.uid, name:user.displayName||'', email:user.email, username:user.email.split('@')[0], stats:{bioViews:0,qrScans:0,linkClicks:0}, plan:'free' }; }
    if(['landing','login','register'].includes(currentPage)) navigate('dashboard');
    else render();
  } else {
    userData = null;
    if(['dashboard','bio','qr','resume','invoice'].includes(currentPage)) navigate('landing');
    else render();
  }
});

/* ─── Render ─── */
function render() {
  if(['landing','login','register','pricing'].includes(currentPage)) renderPublic();
  else if(currentUser) renderApp();
  else renderPublic();
}

/* ─── Public Nav ─── */
function publicNav() {
  return `<nav style="position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)">
    <div style="max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between">

        <span style="font-size:18px;font-weight:800;letter-spacing:-.5px">Luviio</span>
      </a>
      <div style="display:flex;align-items:center;gap:6px">

          :`<a class="nav-link" onclick="window._nav('login')">Sign In</a><button class="btn btn-primary btn-sm" onclick="window._nav('register')">Get Started</button>`
        }
      </div>
    </div>
  </nav>`;
}

/* ─── App Nav ─── */
function appNav() {
  const tabs = [
    {id:'dashboard',icon:'fa-solid fa-grid-2',label:'Dashboard'},
    {id:'bio',icon:'fa-solid fa-user',label:'Bio'},
    {id:'qr',icon:'fa-solid fa-qrcode',label:'QR'},
    {id:'resume',icon:'fa-solid fa-file-lines',label:'Resume'},
    {id:'invoice',icon:'fa-solid fa-file-invoice',label:'Invoice'},
  ];
  const active = currentPage;
  return `<nav style="position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)">
    <div style="max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between">
      <a onclick="window._nav('landing')" style="cursor:pointer;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text)">
        <div style="width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center"><i class="fa-solid fa-bolt" style="color:#fff;font-size:14px"></i></div>
        <span style="font-size:18px;font-weight:800;letter-spacing:-.5px">Luviio</span>
      </a>
      <div style="display:flex;align-items:center;gap:4px" class="no-print">
        ${tabs.map(t=>`<a class="nav-link ${active===t.id?'active':''}" onclick="window._nav('${t.id}')"><i class="${t.icon}" style="margin-right:4px;font-size:12px"></i><span class="hidden sm:inline">${t.label}</span></a>`).join('')}
      </div>

  let dragIdx = null;
  list.querySelectorAll('.link-item').forEach(item => {
    item.addEventListener('dragstart', e => { dragIdx = +item.dataset.idx; item.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    item.addEventListener('dragend', () => { item.classList.remove('dragging'); dragIdx=null; });
    item.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; });
    item.addEventListener('drop', e => {
      e.preventDefault();
      const dropIdx = +item.dataset.idx;
      if(dragIdx!==null && dragIdx!==dropIdx) {
        const [moved] = bioState.links.splice(dragIdx,1);
        bioState.links.splice(dropIdx,0,moved);
        renderBio();
      }
    });
  });
}

      <div style="text-align:center;margin-bottom:24px"><a onclick="window._nav('landing')" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--accent);text-decoration:none"><i class="fa-solid fa-bolt" style="font-size:12px"></i>Luviio</a></div>
      <div style="background:#fff;border-radius:20px;padding:40px 28px;box-shadow:0 4px 30px rgba(0,0,0,.06);text-align:center">
        ${avatar?`<img src="${esc(avatar)}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 14px;border:3px solid var(--border)">`:`<div style="width:80px;height:80px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--accent);font-size:32px;font-weight:800">${initial}</div>`}
        <h1 style="font-size:22px;font-weight:800;letter-spacing:-.3px">${esc(name)}</h1>
        ${bio.bio?`<p style="font-size:14px;color:var(--text-secondary);margin-top:8px;line-height:1.6">${esc(bio.bio)}</p>`:''}
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:24px">
          ${links.map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:${l.color}10;border:1px solid ${l.color}20;border-radius:14px;text-decoration:none;color:var(--text);font-size:15px;font-weight:600;transition:all .2s" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 12px ${l.color}20'" onmouseout="this.style.transform='';this.style.boxShadow=''"><i class="${l.icon}" style="color:${l.color};font-size:18px;width:22px;text-align:center"></i><span style="flex:1;text-align:left">${esc(l.title)}</span><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:11px;color:var(--text-muted)"></i></a>`).join('')}
        </div>
        <p style="font-size:11px;color:var(--text-muted);margin-top:28px">Powered by <a onclick="window._nav('landing')" style="color:var(--accent);cursor:pointer;font-weight:600">Luviio</a></p>
      </div>
    </div>
  </main>`;
}

/* ─── Utility ─── */
function esc(str) { if(!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ─── Global Handlers ─── */
window._nav = page => navigate(page);
window._logout = () => logoutUser();
window._googleLogin = () => loginGoogle();
window._emailLogin = () => {
  const email = $('login-email')?.value?.trim();
  const pass = $('login-pass')?.value;
  if(!email||!pass) { toast('Please fill in all fields','error'); return; }
  loginEmail(email, pass);
};
window._emailRegister = () => {
  const name = $('reg-name')?.value?.trim();
  const email = $('reg-email')?.value?.trim();
  const pass = $('reg-pass')?.value;
  if(!name||!email||!pass) { toast('Please fill in all fields','error'); return; }
  registerEmail(name, email, pass);
};
window._tryDemo = tool => {
  if(tool==='bio') { toast('Bio demo loaded — editing is live!','info'); navigate('bio'); }
  else if(tool==='qr') { toast('QR demo — try generating a code!','info'); navigate('qr'); }
  else if(tool==='resume') { toast('Resume demo — start typing to see the preview!','info'); navigate('resume'); }
  else if(tool==='invoice') { toast('Invoice demo — fill in the fields!','info'); navigate('invoice'); }
};

// Username
window._editUsername = async () => {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">Edit Username</h3><p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">Your public profile: luviio.com/<strong id="un-preview">${userData?.username||''}</strong></p><input class="input" id="un-input" value="${userData?.username||''}" placeholder="username" style="margin-bottom:20px"><div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-secondary btn-sm" id="un-cancel">Cancel</button><button class="btn btn-primary btn-sm" id="un-save">Save</button></div></div>`;
  document.body.appendChild(overlay);
  const inp = $('un-input');
  const preview = $('un-preview');
  inp.addEventListener('input', () => { preview.textContent = inp.value.toLowerCase().replace(/[^a-z0-9._-]/g,''); });
  $('un-cancel').onclick = () => overlay.remove();
  $('un-save').onclick = async () => {
    const ok = await updateUsername(currentUser.uid, inp.value);
    if(ok) { overlay.remove(); renderDashboard(); }
  };
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  inp.focus();
};

// Bio
window._updateBio = (key, val) => { bioState[key] = val; refreshBioPreview(); };
window._updateBioLink = (idx, key, val) => { bioState.links[idx][key] = val; refreshBioPreview(); };
window._removeBioLink = idx => { bioState.links.splice(idx,1); renderBio(); };
window._addBioLink = () => {
  if(userData?.plan!=='pro' && bioState.links.length>=5) { toast('Upgrade to Pro for unlimited links','error'); return; }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">Add Link</h3><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;max-height:280px;overflow-y:auto">${linkPresets.map((p,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='var(--accent-subtle)';this.style.background='var(--accent-light)'" onmouseout="this.style.borderColor='var(--border)';this.style.background=''" onclick="window._selectLinkPreset(${i})"><i class="${p.icon}" style="color:${p.color};font-size:16px;width:20px;text-align:center"></i><span style="font-size:14px;font-weight:600;flex:1">${p.title}</span><i class="fa-solid fa-plus" style="color:var(--text-muted);font-size:12px"></i></div>`).join('')}</div><button class="btn btn-secondary btn-sm" style="width:100%" onclick="this.closest('.modal-overlay').remove()">Cancel</button></div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
};
window._selectLinkPreset = idx => {
  const p = linkPresets[idx];
  bioState.links.push({...p, id:Date.now()});
  document.querySelector('.modal-overlay')?.remove();
  renderBio();
};
window._saveBio = async () => {
  if(!currentUser) { toast('Sign in to save','error'); return; }
  await saveBioData(currentUser.uid);
  toast('Bio saved!','success');
  track('save_bio');
};

// QR
window._generateQR = () => {
  const input = $('qr-input')?.value?.trim();
  if(!input) { toast('Enter a URL or text','error'); return; }
  const size = +($('qr-size')?.value||300);
  const color = $('qr-color')?.value||'#0F172A';
  const output = $('qr-output');
  output.innerHTML = `<div id="qr-code" style="padding:20px;background:#fff;border-radius:16px;display:inline-block"></div><div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="window._downloadQR()"><i class="fa-solid fa-download"></i> Download PNG</button></div>`;
  try {
    new QRCode($('qr-code'), { text:input, width:size, height:size, colorDark:color, colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.H });
    track('generate_qr');
    toast('QR code generated!','success');
  } catch(e) { toast('Failed to generate QR','error'); }
};
window._downloadQR = () => {
  const canvas = $('qr-code')?.querySelector('canvas');
  if(!canvas) { toast('Generate a QR code first','error'); return; }
  const a = document.createElement('a');
  a.download = 'luviio-qr.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  toast('QR downloaded!','success');
  track('download_qr');
};

// Resume
window._updateResume = (key, val) => { resumeState[key] = val; refreshResumePreview(); };
window._updateResumeSkills = val => { resumeState.skills = val.split(',').map(s=>s.trim()).filter(Boolean); refreshResumePreview(); };
window._updateExp = (idx, key, val) => { resumeState.experiences[idx][key] = val; refreshResumePreview(); };
window._addExp = () => { resumeState.experiences.push({company:'',role:'',period:'',desc:''}); renderResume(); };
window._removeExp = idx => { resumeState.experiences.splice(idx,1); renderResume(); };
window._updateEdu = (idx, key, val) => { resumeState.education[idx][key] = val; refreshResumePreview(); };
window._addEdu = () => { resumeState.education.push({school:'',degree:'',year:''}); renderResume(); };
window._removeEdu = idx => { resumeState.education.splice(idx,1); renderResume(); };
window._saveResume = async () => {
  if(!currentUser) { toast('Sign in to save','error'); return; }
  await saveResumeData(currentUser.uid);
  toast('Resume saved!','success');
  track('save_resume');
};
window._exportResumePDF = () => {
  const el = $('resume-preview');
  if(!el) return;
  toast('Generating PDF...','info');
  const opt = { margin:0, filename:'resume.pdf', image:{type:'jpeg',quality:0.98}, html2canvas:{scale:2,useCORS:true}, jsPDF:{unit:'mm',format:'a4',orientation:'portrait'} };
  html2pdf().set(opt).from(el).save().then(()=>{ toast('Resume PDF exported!','success'); track('export_resume_pdf'); });
};

// Invoice
window._updateInv = (key, val) => { invoiceState[key] = val; refreshInvoicePreview(); };
window._updateInvFrom = (key, val) => { invoiceState.from[key] = val; refreshInvoicePreview(); };
window._updateInvTo = (key, val) => { invoiceState.to[key] = val; refreshInvoicePreview(); };
window._updateInvItem = (idx, key, val) => { invoiceState.items[idx][key] = val; refreshInvoicePreview(); };
window._addInvItem = () => { invoiceState.items.push({desc:'',qty:1,price:0}); renderInvoice(); };
window._removeInvItem = idx => { if(invoiceState.items.length>1) { invoiceState.items.splice(idx,1); renderInvoice(); } };
window._saveInvoice = async () => {
  if(!currentUser) { toast('Sign in to save','error'); return; }
  await saveInvoiceData(currentUser.uid);
  toast('Invoice saved!','success');
  track('save_invoice');
};
window._exportInvoicePDF = () => {
  const el = $('invoice-preview');
  if(!el) return;
  toast('Generating PDF...','info');
  const opt = { margin:10, filename:`${invoiceState.invoiceNo||'invoice'}.pdf`, image:{type:'jpeg',quality:0.98}, html2canvas:{scale:2,useCORS:true}, jsPDF:{unit:'mm',format:'a4',orientation:'portrait'} };
  html2pdf().set(opt).from(el).save().then(()=>{ toast('Invoice PDF exported!','success'); track('export_invoice_pdf'); });
};
window._sendInvoiceWhatsApp = () => {
  const total = invoiceState.items.reduce((s,i)=>s+(i.qty*i.price||0),0);
  const text = `Invoice ${invoiceState.invoiceNo}\nDate: ${invoiceState.date}\nTo: ${invoiceState.to.name}\nTotal: $${total.toFixed(2)}\n\nPlease find the full invoice in the attached PDF.`;
  const phone = (invoiceState.to.phone||'').replace(/[^0-9]/g,'');
  if(!phone) { toast('Add client phone number to send via WhatsApp','error'); return; }
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`,'_blank');
  track('send_invoice_whatsapp');
};

/* ─── Responsive Grid Fix ─── */
const style = document.createElement('style');
style.textContent = `@media(min-width:1024px){.lg-grid{grid-template-columns:1fr 340px !important}.lg-grid-equal{grid-template-columns:1fr 1fr !important}}`;
document.head.appendChild(style);

/* ─── Init ─── */
render();

/* ─── Load data when entering tools ─── */
const origNavigate = navigate;
const toolLoaders = {
  bio: async ()=>{ if(currentUser) await loadBioData(currentUser.uid); },
  resume: async ()=>{ if(currentUser) await loadResumeData(currentUser.uid); },
  invoice: async ()=>{ if(currentUser) await loadInvoiceData(currentUser.uid); },
};

</script>
</body>
</html>
