<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Update — Luviio</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f8fafc; font-family: Inter, sans-serif; }

.container { max-width:720px; margin:auto; padding:48px 20px; }

.card {
  background:white;
  border-radius:20px;
  padding:28px;
  box-shadow:0 12px 30px rgba(0,0,0,0.05);
}

.input {
  width:100%; height:52px;
  border-radius:12px; padding:0 14px;
  border:1px solid #e5e7eb;
}
.input:focus {
  border-color:#ff005e;
  box-shadow:0 0 0 3px rgba(255,0,94,0.12);
  outline:none;
}

.textarea { height:140px; padding:12px; resize:none; }

/* Dropzone */
.dropzone {
  border:2px dashed #e5e7eb;
  border-radius:16px;
  padding:30px;
  text-align:center;
  transition:.2s;
  cursor:pointer;
}
.dropzone.active { border-color:#ff005e; background:#fff5f8; }

/* Preview */
.preview {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:16px;
}

.preview-item {
  position:relative;
  border-radius:14px;
  overflow:hidden;
}

.preview-item img {
  width:100%; height:100px;
  object-fit:cover;
}

.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  opacity:0;
  transition:.2s;
}

.preview-item:hover .overlay { opacity:1; }

.overlay button {
  background:white;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

/* Modal */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
}
.modal img {
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}

/* Button */
.btn {
  height:54px;
  border-radius:14px;
  background:#ff005e;
  color:white;
  font-weight:600;
}

/* Success */
.success {
  display:none;
  min-height:100vh;
  align-items:center;
  justify-content:center;
}
.success-card {
  background:white;
  padding:40px;
  border-radius:24px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<div id="app" class="container">

<h1 class="text-3xl font-semibold text-center mb-6">Request an Update</h1>

<form id="form" action="https://formsubmit.co/forms@luviio.com" method="POST" class="space-y-6">

<input type="hidden" name="Request ID" id="requestId">
<input type="hidden" name="Image URLs" id="imageUrls">

<div class="card space-y-4">
<input required name="Name" class="input" placeholder="Full Name *">
<input required type="email" name="Email" class="input" placeholder="Email *">
<input required name="Website" class="input" placeholder="Website URL *">
</div>

<div class="card space-y-4">

<textarea required name="Details" class="input textarea"
placeholder="Describe your request clearly. Include exact text changes, sections, or references to help us implement accurately."></textarea>

<div id="dropzone" class="dropzone">
  <p class="text-sm text-gray-600">Drag & drop images or click to upload</p>
  <p class="text-xs text-gray-400">Up to 10 images • JPG / PNG • Max 5MB each</p>
  <input type="file" id="fileInput" multiple accept="image/png,image/jpeg" hidden>
</div>

<div id="preview" class="preview"></div>

</div>

<div class="flex gap-2 text-sm">
<input type="checkbox" required>
<p>
By submitting, you confirm all content is accurate and you agree to 
<a href="https://www.luviio.com/terms" target="_blank" class="text-[#ff005e] underline">Terms</a>.
</p>
</div>

<button id="btn" class="btn w-full">Submit Request</button>

</form>
</div>

<!-- SUCCESS -->
<div id="success" class="success">
<div class="success-card">

<h2 class="text-xl font-semibold mb-2">Request Submitted</h2>
<p id="requestIdDisplay" class="text-sm text-gray-500"></p>

<p class="text-gray-500 mt-4 text-sm">We’ll respond within 24 hours.</p>

<button onclick="window.location.href='https://luviio.com'" class="btn mt-6 w-full">
Back to Home
</button>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="this.style.display='none'">
  <img id="modalImg">
</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

const form = document.getElementById("form");
const btn = document.getElementById("btn");

const imageUrlsField = document.getElementById("imageUrls");
const requestIdField = document.getElementById("requestId");

const API = "b71c4d815f32121f479535866ad1de1c";

let files = [];

/* HANDLE FILES */
function addFile(file) {

  if (files.length >= 10) {
    alert("Maximum 10 images allowed.");
    return;
  }

  if (!file.type.match("image/jpeg") && !file.type.match("image/png")) {
    alert("Only JPG/PNG allowed.");
    return;
  }

  if (file.size > 5 * 1024 * 1024) {
    alert("Max 5MB per image.");
    return;
  }

  const id = Date.now() + Math.random();
  files.push({file, id});

  const url = URL.createObjectURL(file);

  const div = document.createElement("div");
  div.className = "preview-item";
  div.dataset.id = id;

  div.innerHTML = `
    <img src="${url}">
    <div class="overlay">
      <button onclick="event.stopPropagation(); viewImage('${url}')">View</button>
      <button onclick="event.stopPropagation(); removeImage('${id}')">Remove</button>
    </div>
  `;

  div.onclick = () => viewImage(url);

  preview.appendChild(div);
}

/* EVENTS */
dropzone.onclick = () => fileInput.click();

dropzone.ondragover = e => {
  e.preventDefault();
  dropzone.classList.add("active");
};

dropzone.ondragleave = () => dropzone.classList.remove("active");

dropzone.ondrop = e => {
  e.preventDefault();
  dropzone.classList.remove("active");
  [...e.dataTransfer.files].forEach(addFile);
};

fileInput.onchange = () => {
  [...fileInput.files].forEach(addFile);
};

/* REMOVE */
function removeImage(id) {
  files = files.filter(f => f.id != id);
  document.querySelector(`[data-id="${id}"]`).remove();
}

/* VIEW */
function viewImage(src) {
  document.getElementById("modalImg").src = src;
  document.getElementById("modal").style.display = "flex";
}

/* ID */
function generateId() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  return "RL-" + Array.from({length:6}, () =>
    chars[Math.floor(Math.random()*chars.length)]
  ).join("");
}

/* UPLOAD */
async function uploadImage(file) {
  const fd = new FormData();
  fd.append("image", file);

  const res = await fetch(`https://api.imgbb.com/1/upload?key=${API}`, {
    method:"POST",
    body:fd
  });

  const data = await res.json();
  return data.data.url;
}

/* SUBMIT */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }

  btn.disabled = true;
  btn.innerHTML = "Processing...";

  const requestId = generateId();
  requestIdField.value = requestId;

  let urls = [];

  if (files.length > 0) {
    const uploads = files.map(f => uploadImage(f.file));
    urls = await Promise.all(uploads);
  }

  imageUrlsField.value = urls.join(", ");

  await fetch(form.action, {
    method:"POST",
    body:new FormData(form)
  });

  document.getElementById("app").style.display = "none";
  document.getElementById("success").style.display = "flex";
  document.getElementById("requestIdDisplay").innerText = "Reference ID: #" + requestId;
});
</script>

</body>
</html>
