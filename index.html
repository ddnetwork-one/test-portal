    :root {

      --headline: #fffffe;
      --paragraph: #abd1c6;

      min-height: 100vh;
    }

      border: 1px solid rgba(171, 209, 198, 0.12);
    }
    
    .btn-primary {
      background: var(--button);
      color: var(--button-text);
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(249, 188, 96, 0.3);
    }
    
    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(171, 209, 198, 0.3);
      color: var(--headline);
      transition: all 0.3s ease;
    }
    .btn-secondary:hover {
      background: rgba(171, 209, 198, 0.1);
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--button);
      box-shadow: 0 0 0 3px rgba(249, 188, 96, 0.15);
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }

        radial-gradient(at 80% 0%, rgba(249, 188, 96, 0.08) 0px, transparent 50%),

    ::-webkit-scrollbar-thumb { background: var(--paragraph); border-radius: 4px; }

      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }

<body>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ============ ICON COMPONENT ============
    function Icon({ name, size = 20, className = "" }) {
      const ref = useRef(null);
      
      useEffect(() => {
        if (ref.current && typeof lucide !== 'undefined' && lucide.icons && lucide.icons[name]) {
          try {
            ref.current.innerHTML = '';
            const svg = lucide.createElement(lucide.icons[name]);
            svg.setAttribute('width', size);
            svg.setAttribute('height', size);
            if (className) svg.setAttribute('class', className);
            ref.current.appendChild(svg);
          } catch(e) {
            ref.current.innerHTML = `<span style="font-size:${size}px">${name}</span>`;
          }
        }
      }, [name, size, className]);
      
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
    }

      { id: 3, recipient: 'mike@startup.co', subject: 'Special offer inside', status: 'Failed', date: '2024-01-13' },
      { id: 4, recipient: 'emma@design.studio', subject: 'New feature announcement', status: 'Sent', date: '2024-01-12' },

    function SimpleChart({ data }) {
      const maxVal = Math.max(...data.map(d => d.value));

        <div className="w-full h-[280px] flex items-end gap-2 px-2">
          {data.map((item, i) => (
            <div key={i} className="flex-1 flex flex-col items-center gap-2">
              <div

              ></div>
              <span className="text-xs text-brand-paragraph">{item.month}</span>
            </div>
          ))}
        </div>
      );
    }

    // ============ NAVIGATION ============

            <div className="overflow-x-auto">
              <table className="w-full">
                <thead><tr className="border-b border-white/10 bg-white/[0.02]"><th className="text-left py-4 px-6 text-sm font-medium text-brand-paragraph">Recipient</th><th className="text-left py-4 px-6 text-sm font-medium text-brand-paragraph">Subject</th><th className="text-left py-4 px-6 text-sm font-medium text-brand-paragraph">Status</th><th className="text-right py-4 px-6 text-sm font-medium text-brand-paragraph">Date</th><th className="text-right py-4 px-6 text-sm font-medium text-brand-paragraph">Actions</th></tr></thead>
                <tbody>
                  {filtered.map(email => (
                    <tr key={email.id} className="border-b border-white/5 hover:bg-white/[0.02]">
                      <td className="py-4 px-6"><div className="flex items-center gap-3"><div className="w-10 h-10 rounded-lg bg-gradient-to-br from-brand-secondary to-brand-main flex items-center justify-center text-xs font-bold text-brand-stroke">{email.recipient.substring(0,2).toUpperCase()}</div><span className="font-medium">{email.recipient}</span></div></td>
                      <td className="py-4 px-6 text-brand-paragraph">{email.subject}</td>
                      <td className="py-4 px-6"><span className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium ${email.status==='Sent'?'bg-green-500/15 text-green-400':'bg-red-500/15 text-red-400'}`}><span className={`w-1.5 h-1.5 rounded-full ${email.status==='Sent'?'bg-green-400':'bg-red-400'}`}></span>{email.status}</span></td>
                      <td className="py-4 px-6 text-right text-brand-paragraph">{email.date}</td>
                      <td className="py-4 px-6 text-right"><button className="p-2 rounded-lg hover:bg-white/5"><Icon name="MoreHorizontal" size={18} className="text-brand-paragraph" /></button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {filtered.length===0 && <div className="text-center py-12"><Icon name="Inbox" size={48} className="mx-auto text-brand-paragraph/30 mb-4" /><p className="text-brand-paragraph">No emails found.</p></div>}
          </div>
        </div>
      );
    }

    // ============ BILLING PAGE ============
    function BillingPage({ setCurrentPage }) {
      return (
        <div className="space-y-6 pb-24 lg:pb-6">
          <div><h1 className="font-display text-2xl sm:text-3xl font-bold">Billing & Plans</h1><p className="text-brand-paragraph mt-1">Manage your subscription</p></div>
          <div className="glass-card rounded-2xl p-6">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
              <div><div className="flex items-center gap-3 mb-2"><h3 className="font-display text-xl font-semibold">Current Plan</h3><span className="px-3 py-1 rounded-full bg-brand-secondary/15 text-brand-secondary text-sm font-medium">Active</span></div><p className="text-brand-paragraph">Free Plan - RM0/month</p></div>
              <button className="btn-secondary px-5 py-2.5 rounded-xl font-medium">Cancel Plan</button>
            </div>
            <div className="p-4 rounded-xl bg-white/[0.03] border border-white/10"><div className="flex justify-between mb-3"><span className="text-sm text-brand-paragraph">Monthly Usage</span><span className="font-semibold">3 / 10 emails</span></div><div className="h-3 bg-white/10 rounded-full overflow-hidden"><div className="h-full w-[30%] bg-gradient-to-r from-brand-button to-orange-400 rounded-full"></div></div></div>
          </div>
          <div><h3 className="font-display text-xl font-semibold mb-4">Upgrade Your Plan</h3><div className="grid md:grid-cols-2 gap-6">
            {[{name:'Starter',price:39,old:59,features:['500 emails/month','No watermark','Analytics dashboard','Email support'],pop:true},{name:'Pro',price:129,old:179,features:['5000 emails/month','Advanced analytics','Priority support','Custom branding'],pop:false}].map((plan,i)=>(
              <div key={i} className={`rounded-2xl p-6 transition-all hover:-translate-y-1 ${plan.pop?'bg-gradient-to-br from-brand-button/15 to-brand-button/5 border-2 border-brand-button':'glass-card hover:bg-white/[0.04]'}`}>
                {plan.pop&&<div className="absolute -top-3 left-6 px-3 py-1 bg-brand-button text-brand-button-text text-xs font-semibold rounded-full relative">Recommended</div>}
                <div className="mb-4 relative"><h4 className="font-display text-xl font-semibold mb-1">{plan.name}</h4><div className="flex items-baseline gap-2"><span className="font-display text-3xl font-bold">RM{plan.price}</span><span className="text-brand-paragraph line-through text-sm">RM{plan.old}</span><span className="text-brand-paragraph">/month</span></div></div>
                <ul className="space-y-3 mb-6">{plan.features.map((f,j)=><li key={j} className="flex items-center gap-2 text-sm text-brand-paragraph"><Icon name="Check" size={16} className="text-brand-button" />{f}</li>)}</ul>
                <button className={`w-full py-3 rounded-xl font-semibold ${plan.pop?'btn-primary':'btn-secondary'}`}>Upgrade to {plan.name}</button>
              </div>
            ))}
          </div></div>
        </div>
      );
    }

    // ============ SETTINGS PAGE ============
    function SettingsPage() {
      return (
        <div className="space-y-6 pb-24 lg:pb-6">
          <div><h1 className="font-display text-2xl sm:text-3xl font-bold">Settings</h1><p className="text-brand-paragraph mt-1">Manage your account</p></div>
          <div className="glass-card rounded-2xl p-6"><h3 className="font-display text-lg font-semibold mb-6">Profile Information</h3>
            <div className="flex flex-col sm:flex-row items-start gap-6 mb-6">
              <div className="relative"><div className="w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-button to-orange-400 flex items-center justify-center text-brand-button-text font-bold text-2xl">JD</div><button className="absolute -bottom-2 -right-2 w-8 h-8 rounded-lg bg-brand-bg border border-white/20 flex items-center justify-center hover:bg-white/5"><Icon name="Camera" size={14} /></button></div>
              <div className="flex-1 space-y-4 w-full">
                {[{l:'Full Name',v:'John Doe'},{l:'Email',v:'john@example.com'},{l:'Company',v:'Acme Inc.'}].map((item,i)=>(<div key={i}><label className="block text-sm font-medium mb-2">{item.l}</label><input defaultValue={item.v} className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10" /></div>))}
              </div>
            </div>
            <button className="btn-primary px-6 py-3 rounded-xl font-semibold">Save Changes</button>
          </div>
          <div className="glass-card rounded-2xl p-6"><h3 className="font-display text-lg font-semibold mb-4">Plan Details</h3>
            <div className="p-4 rounded-xl bg-white/[0.03] border border-white/10 mb-4"><div className="flex items-center justify-between mb-3"><div className="flex items-center gap-3"><div className="w-10 h-10 rounded-xl bg-brand-secondary/15 flex items-center justify-center"><Icon name="Package" size={20} className="text-brand-secondary" /></div><div><div className="font-medium">Free Plan</div><div className="text-sm text-brand-paragraph">10 emails per month</div></div></div><span className="px-3 py-1 rounded-full bg-brand-secondary/15 text-brand-secondary text-sm font-medium">Current</span></div></div>
            <div className="p-4 rounded-xl bg-brand-button/10 border border-brand-button/20"><div className="flex items-start gap-3"><div className="w-10 h-10 rounded-xl bg-brand-button/20 flex items-center justify-center shrink-0"><Icon name="Stamp" size={20} className="text-brand-button" /></div><div><div className="font-medium text-brand-button mb-1">Watermark Enabled</div><p className="text-sm text-brand-paragraph mb-3">Your emails display "Sent via LuvMail" branding. Upgrade to remove.</p><button className="btn-primary px-4 py-2 rounded-lg text-sm font-semibold">Upgrade to Remove</button></div></div></div>
          </div>
          <div className="glass-card rounded-2xl p-6 border border-red-500/20"><h3 className="font-display text-lg font-semibold text-red-400 mb-4">Danger Zone</h3><p className="text-sm text-brand-paragraph mb-4">Once you delete your account, there is no going back.</p><button className="px-5 py-2.5 rounded-xl bg-red-500/15 text-red-400 font-semibold hover:bg-red-500/25">Delete Account</button></div>
        </div>
      );
    }

    // ============ DASHBOARD LAYOUT ============
    function DashboardLayout({ children, currentPage, setCurrentPage }) {
      return (
        <div className="min-h-screen bg-brand-bg">
          <Sidebar currentPage={currentPage} setCurrentPage={setCurrentPage} />
          <main className="lg:ml-64 min-h-screen"><TopBar /><div className="p-6">{children}</div></main>
          <MobileNav currentPage={currentPage} setCurrentPage={setCurrentPage} />
        </div>
      );
    }

    // ============ LANDING PAGE ============
    function LandingPage({ setCurrentPage }) {
      return (
        <div className="min-h-screen">
          <HeroSection setCurrentPage={setCurrentPage} />
          <FeaturesSection />
          <PricingSection setCurrentPage={setCurrentPage} />
          <Footer setCurrentPage={setCurrentPage} />
        </div>
      );
    }

    // ============ MAIN APP ============
    function App() {
      const [page, setPage] = useState('home');
      
      useEffect(() => { window.scrollTo(0,0); }, [page]);
      
      const showNav = !page.startsWith('dashboard') && page!=='login' && page!=='signup';
      
      const content = (() => {
        switch(page) {
          case 'login': return <LoginPage setCurrentPage={setPage} />;
          case 'signup': return <SignUpPage setCurrentPage={setPage} />;
          case 'dashboard':
          case 'dashboard/dashboard': return <DashboardLayout currentPage={page} setCurrentPage={setPage}><DashboardHome /></DashboardLayout>;
          case 'dashboard/send': return <DashboardLayout currentPage={page} setCurrentPage={setPage}><SendEmailPage /></DashboardLayout>;
          case 'dashboard/history': return <DashboardLayout currentPage={page} setCurrentPage={setPage}><HistoryPage /></DashboardLayout>;
          case 'dashboard/billing': return <DashboardLayout currentPage={page} setCurrentPage={setPage}><BillingPage setCurrentPage={setPage} /></DashboardLayout>;
          case 'dashboard/settings': return <DashboardLayout currentPage={page} setCurrentPage={setPage}><SettingsPage /></DashboardLayout>;
          default: return <LandingPage setCurrentPage={setPage} />;
        }
      })();
      
      return <div className="min-h-screen bg-brand-bg">{showNav && <Navigation currentPage={page} setCurrentPage={setPage} />}{content}</div>;
    }

    // Render
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Lucide Icons (load after React) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</body>
</html>
