<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuvTools by Luviio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #EEF2FF;
            --bg: #FAFBFC;
            --fg: #0F172A;
            --muted: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --radius: 16px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
            --shadow-xl: 0 20px 25px -5px rgba(99,102,241,0.12), 0 10px 10px -5px rgba(0,0,0,0.03);
        }
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Effects */
        .glass {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .gradient-text {
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 50%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .gradient-bg-subtle {
            background: linear-gradient(135deg, #EEF2FF 0%, #FDF4FF 50%, #FFF1F2 100%);
        }

        /* Enhanced Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(99,102,241,0.35);
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99,102,241,0.45);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-secondary {
            background: white;
            color: var(--fg);
            border: 1.5px solid var(--border);
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            box-shadow: var(--shadow-sm);
        }
        
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        /* Input Fields */
        .input-field {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.25s ease;
            outline: none;
            background: white;
            color: var(--fg);
        }
        
        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.1), var(--shadow-sm);
        }
        
        .input-field::placeholder {
            color: #94A3B8;
        }

        /* Cards */
        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-elevated {
            background: white;
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Navigation */
        .nav-link {
            color: var(--muted);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 10px;
            transition: all 0.25s ease;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-link:hover, .nav-link.active {
            color: var(--primary);
            background: var(--primary-light);
        }

        .page { display: none; animation: fadeInUp 0.4s ease-out; }
        .page.active { display: block; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            padding: 16px 24px;
            border-radius: 14px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideInRight 0.35s cubic-bezier(0.68,-0.55,0.265,1.55);
            box-shadow: var(--shadow-xl);
            backdrop-filter: blur(10px);
            max-width: 380px;
        }

        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tool Preview Area */
        .tool-preview {
            background: linear-gradient(135deg, #F8FAFC 0%, #F1F5F9 100%);
            border: 2px dashed #CBD5E1;
            border-radius: var(--radius);
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .tool-preview.has-content {
            border-style: solid;
            border-color: #E2E8F0;
            background: white;
        }

        /* Usage Bar */
        .usage-bar {
            height: 6px;
            background: #E2E8F0;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .usage-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366F1, #A855F7);
            border-radius: 3px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        th, td {
            text-align: left;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }
        
        th {
            font-weight: 600;
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #F8FAFC;
        }

        tr:hover td {
            background: #FAFBFC;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        /* Watermark */
        .watermark {
            position: absolute;
            bottom: 16px;
            right: 16px;
            color: rgba(148,163,184,0.4);
            font-size: 11px;
            pointer-events: none;
            letter-spacing: 0.02em;
        }

        /* Mobile Menu Animation */
        #mobile-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        
        #mobile-menu.open {
            max-height: 400px;
        }

        /* Floating Action Button for Mobile */
        .sticky-generate {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            box-shadow: 0 8px 32px rgba(99,102,241,0.4);
            width: calc(100% - 32px);
            max-width: 360px;
        }
        
        @media (min-width: 768px) {
            .sticky-generate {
                position: static;
                transform: none;
                box-shadow: none;
                width: auto;
                max-width: none;
            }
        }

        /* Badge styles */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .badge-pro {
            background: linear-gradient(135deg, #FEF3C7, #FDE68A);
            color: #92400E;
        }

        .badge-free {
            background: #F1F5F9;
            color: #475569;
        }

        /* Pulse animation for live preview indicator */
        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #10B981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Hero gradient orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.5;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 glass z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-17">
                <a href="/" onclick="navigate('/'); return false;" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg group-hover:scale-105 transition-transform">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </div>
                    <div>
                        <span class="font-bold text-xl tracking-tight">LuvTools</span>
                        <span class="text-gray-400 text-xs block -mt-1">by Luviio</span>
                    </div>
                </a>
                
                <div id="nav-links" class="hidden md:flex items-center gap-1"></div>
                
                <div id="auth-buttons" class="flex items-center gap-3"></div>
                
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-xl hover:bg-gray-100/80 transition-colors">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-700"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="md:hidden border-t border-gray-100/50 bg-white/95 backdrop-blur-xl px-4 pb-4">
            <div id="mobile-nav-links" class="flex flex-col gap-1 pt-2"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app" class="pt-17 min-h-screen"></main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { 
            getAuth, 
            GoogleAuthProvider,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signInWithPopup,
            signOut,
            onAuthStateChanged,
            sendEmailVerification,
            updateProfile,
            sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { 
            getFirestore,
            doc,
            setDoc,
            getDoc,
            updateDoc,
            collection,
            query,
            where,
            getDocs
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "appluviio.firebaseapp.com",
            projectId: "appluviio",
            storageBucket: "appluviio.firebasestorage.app",
            messagingSenderId: "598571208819",
            appId: "1:598571208819:web:1a91c501b49b3e604d5a06"
        };

        let app, auth, googleProvider, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            googleProvider = new GoogleAuthProvider();
            db = getFirestore(app);
        } catch (e) {
            console.log('Firebase init failed or demo mode');
        }

        // State Management
        let currentUser = null;
        let userData = null;
        let currentRoute = '/';
        let demoMode = true;

        // Routes Definition - Updated with /tools/* routes
        const routes = {
            public: ['/', '/login', '/register', '/verify', '/tools/qr', '/tools/resume', '/tools/invoice', '/tools/wa'],
            user: ['/u/dashboard', '/u/qr', '/u/resume', '/u/invoice', '/u/wa', '/u/account'],
            admin: ['/admin/dashboard', '/admin/users', '/admin/analytics', '/admin/templates']
        };

        // Initialize App
        function init() {
            setupAuthListener();
            setupRouter();
            handleInitialRoute();
        }

        // Auth Listener
        function setupAuthListener() {
            if (!auth) return;
            
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    try {
                        const userDoc = await getDoc(doc(db, 'users', user.uid));
                        if (userDoc.exists()) {
                            userData = userDoc.data();
                        } else {
                            userData = {
                                uid: user.uid,
                                name: user.displayName || 'User',
                                email: user.email,
                                plan: 'free',
                                role: 'user',
                                suspended: false,
                                forcePro: false,
                                watermarkDisabled: false,
                                emailVerified: user.emailVerified,
                                createdAt: new Date().toISOString()
                            };
                            await setDoc(doc(db, 'users', user.uid), userData);
                        }
                    } catch (e) {
                        console.log('Demo mode - using local state');
                    }
                } else {
                    currentUser = null;
                    userData = null;
                }
                updateNav();
                checkRouteAccess();
            });
        }

        // Router Setup
        function setupRouter() {
            window.addEventListener('popstate', () => {
                currentRoute = window.location.pathname;
                renderPage();
            });
            
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                document.getElementById('mobile-menu').classList.toggle('open');
            });
        }

        function handleInitialRoute() {
            const path = window.location.pathname || '/';
            navigate(path, false);
        }

        // Navigation Function
        window.navigate = function(path, pushState = true) {
            if (pushState) {
                history.pushState(null, '', path);
            }
            currentRoute = path;
            renderPage();
            document.getElementById('mobile-menu').classList.remove('open');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Route Access Check
        function checkRouteAccess() {
            const path = currentRoute;
            
            // Public routes - always accessible
            if (routes.public.includes(path)) return;
            
            // User routes require login and verification
            if (routes.user.some(r => path.startsWith('/u/'))) {
                if (!currentUser) {
                    navigate('/');
                    return;
                }
                if (!isVerified()) {
                    navigate('/verify');
                    return;
                }
                return;
            }
            
            // Admin routes
            if (routes.admin.some(r => path.startsWith('/admin/'))) {
                if (!currentUser) {
                    navigate('/');
                    return;
                }
                if (!isVerified()) {
                    navigate('/verify');
                    return;
                }
                if (!isAdmin()) {
                    navigate('/u/dashboard');
                    return;
                }
            }
        }

        // Helper Functions
        function isVerified() {
            if (demoMode && userData) return true;
            return currentUser?.emailVerified || userData?.emailVerified;
        }

        function isAdmin() {
            return userData?.role === 'superadmin';
        }

        function isPro() {
            return userData?.plan === 'pro' || userData?.forcePro === true;
        }

        function hasWatermark() {
            if (isPro()) return false;
            if (userData?.watermarkDisabled === true) return false;
            return true;
        }

        function checkUsageLimit(tool) {
            // Logged in users have no limits
            if (currentUser && isVerified()) return { allowed: true };
            
            const today = new Date().toDateString();
            const key = `luvtools_usage_${tool}_${today}`;
            const usage = parseInt(localStorage.getItem(key) || '0');
            const limit = 5;
            
            if (usage >= limit) {
                showToast(`Daily limit reached (${limit} uses). Sign up for unlimited access!`, 'warning');
                return { allowed: false, remaining: 0, used: limit, limit: limit };
            }
            
            return { allowed: true, remaining: limit - usage, used: usage, limit: limit };
        }

        function incrementUsage(tool) {
            if (currentUser) return;
            
            const today = new Date().toDateString();
            const key = `luvtools_usage_${tool}_${today}`;
            const usage = parseInt(localStorage.getItem(key) || '0');
            localStorage.setItem(key, usage + 1);
        }

        function getTimeUntilReset() {
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(0, 0, 0, 0);
            const diff = tomorrow - now;
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Update Navigation
        function updateNav() {
            const navLinks = document.getElementById('nav-links');
            const mobileNavLinks = document.getElementById('mobile-nav-links');
            const authButtons = document.getElementById('auth-buttons');
            
            let linksHTML = '';
            let mobileLinksHTML = '';
            let authHTML = '';
            
            if (currentUser && isVerified()) {
                if (isAdmin()) {
                    linksHTML = `
                        <a href="/admin/dashboard" onclick="navigate('/admin/dashboard'); return false;" class="nav-link ${currentRoute.startsWith('/admin') ? 'active' : ''}">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                            Dashboard
                        </a>
                        <a href="/admin/users" onclick="navigate('/admin/users'); return false;" class="nav-link ${currentRoute === '/admin/users' ? 'active' : ''}">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                            Users
                        </a>
                        <a href="/admin/analytics" onclick="navigate('/admin/analytics'); return false;" class="nav-link ${currentRoute === '/admin/analytics' ? 'active' : ''}">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                            Analytics
                        </a>
                    `;
                } else {
                    linksHTML = `
                        <a href="/u/dashboard" onclick="navigate('/u/dashboard'); return false;" class="nav-link ${currentRoute === '/u/dashboard' ? 'active' : ''}">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                            Dashboard
                        </a>
                        <a href="/u/qr" onclick="navigate('/u/qr'); return false;" class="nav-link ${currentRoute === '/u/qr' ? 'active' : ''}">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
                            QR Generator

            return `

        // ==================== TOOL FUNCTIONS ====================

        window.updateQRPlaceholder = function() {
            const type = document.getElementById('qr-type').value;
            const placeholders = { url: 'https://example.com', text: 'Enter your text here...', email: 'your@email.com', phone: '+60 12 345 6789' };
            document.getElementById('qr-content').placeholder = placeholders[type];
        };

        window.generateQR = async function() {
            const btn = document.getElementById('qr-generate-btn');
            const limitCheck = checkUsageLimit(isLoggedIn ? 'qr' : 'qr');
            if (!limitCheck.allowed) return;
            
            const content = document.getElementById('qr-content').value.trim();
            if (!content) {
                showToast('Please enter content for the QR code', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Generating...';
            
            await new Promise(r => setTimeout(r, 600));
            
            const size = parseInt(document.getElementById('qr-size').value);
            const color = document.getElementById('qr-color').value;
            const preview = document.getElementById('qr-preview');
            
            try {
                preview.innerHTML = '';
                preview.classList.add('has-content');
                
                const canvas = document.createElement('canvas');
                await QRCode.toCanvas(canvas, content, {
                    width: size,
                    margin: 2,
                    color: { dark: color, light: '#FFFFFF' },
                    errorCorrectionLevel: 'H'
                });
                canvas.id = 'qr-canvas';
                canvas.style.maxWidth = '100%';
                canvas.style.height = 'auto';
                canvas.style.borderRadius = '12px';
                canvas.style.padding = '16px';
                canvas.style.background = 'white';
                preview.appendChild(canvas);
                
                if (hasWatermark()) {
                    const wm = document.createElement('div');
                    wm.className = 'watermark';
                    wm.textContent = 'LuvTools by Luviio';
                    preview.appendChild(wm);
                }
                
                document.getElementById('qr-actions').classList.remove('hidden');
                document.getElementById('qr-actions').classList.add('flex');
                incrementUsage(isLoggedIn ? 'qr' : 'qr');
                showToast('QR code generated successfully!', 'success');
            } catch (e) {
                console.error(e);
                showToast('Error generating QR code. Please try again.', 'error');
            }
            
            btn.disabled = false;
            btn.innerHTML = '<svg class="inline w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>Generate QR Code';
        };

        window.downloadQR = function() {
            const canvas = document.getElementById('qr-canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = 'qrcode-' + Date.now() + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast('QR code downloaded!', 'success');
            }
        };

        window.copyQR = function() {
            const canvas = document.getElementById('qr-canvas');
            if (canvas) {
                canvas.toBlob(blob => {
                    navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                    showToast('QR code copied to clipboard!', 'success');
                });
            }
        };

        window.handleLogin = async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;

            const btn = document.getElementById('login-btn');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Signing in...';
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast('Signed in successfully!', 'success');
                navigate('/u/dashboard');
            } catch (error) {
                let message = 'Failed to sign in';
                if (error.code === 'auth/user-not-found') message = 'Account not found';
                else if (error.code === 'auth/wrong-password') message = 'Incorrect password';
                else if (error.code === 'auth/invalid-email') message = 'Invalid email address';
                
                if (demoMode) {
                    currentUser = { uid: 'demo-user', email: email, emailVerified: true };
                    userData = { uid: 'demo-user', name: email.split('@')[0], email: email, plan: 'free', role: 'user', suspended: false, forcePro: false, watermarkDisabled: false, emailVerified: true, createdAt: new Date().toISOString() };
                    showToast('Demo mode: Signed in successfully!', 'success');
                    navigate('/u/dashboard');
                    return;
                }
                showToast(message, 'error');
            }
            
            btn.disabled = false;
            btn.textContent = 'Sign In';
        };

        window.handleRegister = async function(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const btn = document.getElementById('register-btn');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Creating account...';
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                await sendEmailVerification(userCredential.user);
                await setDoc(doc(db, 'users', userCredential.user.uid), {
                    uid: userCredential.user.uid, name: name, email: email, plan: 'free', role: 'user',
                    suspended: false, forcePro: false, watermarkDisabled: false, emailVerified: false, createdAt: new Date().toISOString()
                });
                showToast('Account created! Please verify your email.', 'success');
                navigate('/verify');
            } catch (error) {
                let message = 'Failed to create account';
                if (error.code === 'auth/email-already-in-use') message = 'Email already registered';
                else if (error.code === 'auth/weak-password') message = 'Password too weak (min 6 chars)';
                
                if (demoMode) {
                    currentUser = { uid: 'demo-' + Date.now(), email: email, emailVerified: false };
                    userData = { uid: currentUser.uid, name: name, email: email, plan: 'free', role: 'user', suspended: false, forcePro: false, watermarkDisabled: false, emailVerified: false, createdAt: new Date().toISOString() };
                    showToast('Demo mode: Account created!', 'success');
                    navigate('/u/dashboard');
                    return;

                showToast(message, 'error');
            }
            
            btn.disabled = false;
            btn.textContent = 'Create Account';

            if (newName && userData) {
                try {
                    if (!demoMode) await updateDoc(doc(db, 'users', currentUser.uid), { name: newName });
                    userData.name = newName;
                    showToast('Account updated successfully!', 'success');
                    updateNav();
                } catch (e) {
                    userData.name = newName;
                    updateNav();
                    showToast('Changes saved locally (demo mode)', 'success');
                }
            }
        };

        window.handleUpgrade = function() {
            showToast('Redirecting to payment...', 'info');
            setTimeout(() => {
                alert('Payment integration would go here. Pro Plan: RM 9.90/month For demo purposes, your account will be upgraded.');
                if (userData) { userData.plan = 'pro'; renderPage(); showToast('Upgraded to Pro! Enjoy all features.', 'success'); }
            }, 1000);
        };

        // Admin functions
        window.adminChangePlan = async function(uid, newPlan) {
            try { if (!demoMode) await updateDoc(doc(db, 'users', uid), { plan: newPlan }); showToast(`User plan changed to ${newPlan}`, 'success'); loadUsersList(); }
            catch (e) { showToast('Failed to update plan', 'error'); }
        };

        window.adminToggleForcePro = async function(uid, value) {
            try { if (!demoMode) await updateDoc(doc(db, 'users', uid), { forcePro: value }); showToast(value ? 'Pro granted!' : 'Pro grant removed', 'success'); loadUsersList(); }
            catch (e) { showToast('Failed to update', 'error'); }
        };

        window.adminToggleSuspend = async function(uid, value) {
            try { if (!demoMode) await updateDoc(doc(db, 'users', uid), { suspended: value }); showToast(value ? 'User suspended' : 'User activated', 'success'); loadUsersList(); }
            catch (e) { showToast('Failed to update', 'error'); }
        };

        async function loadUsersList() {
            const tbody = document.getElementById('users-table-body');
            if (!tbody) return;
            try {
                let users = [];
                if (!demoMode) {
                    const q = query(collection(db, 'users'));
                    const snapshot = await getDocs(q);
                    users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } else {
                    users = [
                        { id: '1', name: 'John Doe', email: 'john@example.com', plan: 'pro', role: 'user', suspended: false, forcePro: true, watermarkDisabled: true, createdAt: '2024-01-15' },
                        { id: '2', name: 'Jane Smith', email: 'jane@example.com', plan: 'free', role: 'user', suspended: false, forcePro: false, watermarkDisabled: false, createdAt: '2024-02-20' },
                        { id: '3', name: 'Admin User', email: 'admin@luviio.com', plan: 'pro', role: 'superadmin', suspended: false, forcePro: true, watermarkDisabled: true, createdAt: '2024-01-01' },
                    ];
                }
                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td>
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-sm font-bold shadow-sm">${(user.name || 'U')[0].toUpperCase()}</div>
                                <span class="font-semibold text-slate-800">${user.name}</span>
                            </div>
                        </td>
                        <td class="text-slate-600">${user.email}</td>
                        <td><span class="badge ${user.plan === 'pro' ? 'badge-pro' : 'badge-free'}">${user.plan === 'pro' ? 'PRO' : 'Free'}</span></td>
                        <td><span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold ${user.suspended ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${user.suspended ? 'Suspended' : 'Active'}</span></td>
                        <td class="text-slate-500 text-sm">${new Date(user.createdAt).toLocaleDateString()}</td>
                        <td>
                            <div class="flex gap-1.5">
                                <select onchange="adminChangePlan('${user.id}', this.value)" class="text-xs border border-slate-200 rounded-lg px-2 py-1.5 cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <option value="free" ${user.plan === 'free' ? 'selected' : ''}>Free</option>
                                    <option value="pro" ${user.plan === 'pro' ? 'selected' : ''}>Pro</option>
                                </select>
                                <button onclick="adminToggleForcePro('${user.id}', ${!user.forcePro})" class="text-xs px-2.5 py-1.5 rounded-lg font-medium transition-colors ${user.forcePro ? 'bg-yellow-100 text-yellow-700 hover:bg-yellow-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}" title="Force Pro">${user.forcePro ? 'FP+' : 'FP'}</button>
                                <button onclick="adminToggleSuspend('${user.id}', ${!user.suspended})" class="text-xs px-2.5 py-1.5 rounded-lg font-medium transition-colors ${user.suspended ? 'bg-red-100 text-red-700 hover:bg-red-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}" title="Suspend">${user.suspended ? 'Unsuspend' : 'Suspend'}</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-red-500">Error loading users</td></tr>'; }
        }

        // Toast System
        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { success: '#10B981', error: '#EF4444', warning: '#F59E0B', info: '#6366F1' };
            toast.className = 'toast';
            toast.style.background = colors[type] || colors.info;
            toast.style.borderLeft = `4px solid rgba(255,255,255,0.3)`;
            toast.innerHTML = `<div class="flex items-center gap-3"><span class="font-medium">${message}</span></div>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0'; toast.style.transform = 'translateX(120%)'; toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        };

        // Countdown timer updater
        setInterval(() => {
            const timerElements = document.querySelectorAll('[data-countdown]');
            timerElements.forEach(el => {
                el.textContent = getTimeUntilReset();
            });
        }, 1000);

        // Initialize
        init();

        // Override renderPage to handle admin users loading
        const originalRenderPage = renderPage;
        window.renderPage = function() {
            originalRenderPage();
            if (currentRoute === '/admin/users') setTimeout(loadUsersList, 100);
        };
    </script>
</body>
</html>
